<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Procedural Lo-Fi Radio</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0a0f;
            background-image: radial-gradient(circle at center, #1e152a 0%, #08070b 100%);
        }
        
        .glow-orange {
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.4);
        }
        
        .glow-teal {
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.2);
            border-color: rgba(20, 184, 166, 0.4);
        }
        
        .mono-font {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Vinyl Spin animation with speed adjustments dynamically via JS */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-spin {
            animation: spin var(--spin-duration, 4s) linear infinite;
        }

        /* Ambient subtle pulse */
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        .pulse-ambient {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        /* Tape cassette spooling spin */
        @keyframes spool-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spool-animate {
            animation: spool-spin 6s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen text-amber-100 flex flex-col justify-center items-center p-4 overflow-y-auto">

    <div class="w-full max-w-lg bg-zinc-950/80 backdrop-blur-xl border-2 border-zinc-800 rounded-3xl p-6 shadow-2xl relative overflow-hidden flex flex-col gap-6">
        
        <!-- Ambient Cassette Accent Header -->
        <div class="flex justify-between items-center border-b border-zinc-800/80 pb-4">
            <div class="flex items-center gap-2">
                <span class="w-3.5 h-3.5 rounded-full bg-red-500 animate-ping"></span>
                <span class="text-xs uppercase font-semibold text-zinc-500 tracking-wider mono-font">Procedural FM • Live Composition</span>
            </div>
            <div class="text-xs uppercase tracking-widest text-teal-400 font-bold mono-font" id="clock-display">
                DECK: COMPILING
            </div>
        </div>

        <div class="flex flex-col md:flex-row items-center gap-6 bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/50">
            <!-- Rotating Vinyl Deck -->
            <div class="relative w-28 h-28 shrink-0 flex-none">
                <div id="vinyl-disc" class="w-full h-full rounded-full bg-gradient-to-r from-zinc-800 via-black to-zinc-900 flex items-center justify-center shadow-lg relative border-4 border-zinc-950">
                    <!-- Vinyl Grooves -->
                    <div class="absolute inset-2 border border-zinc-800/40 rounded-full"></div>
                    <div class="absolute inset-4 border border-zinc-800/30 rounded-full"></div>
                    <div class="absolute inset-6 border border-zinc-800/20 rounded-full"></div>
                    <!-- Vinyl Center Sticker -->
                    <div class="w-10 h-10 rounded-full bg-amber-500/90 flex items-center justify-center border-2 border-zinc-950">
                        <div class="w-2.5 h-2.5 rounded-full bg-zinc-950"></div>
                    </div>
                </div>
            </div>

            <!-- Track Display Details -->
            <div class="flex-grow w-full text-center md:text-left flex flex-col gap-1.5 min-w-0">
                <div id="track-title" class="text-lg font-bold text-amber-400 truncate tracking-wide leading-snug">Station Off-Air</div>
                <div class="flex flex-wrap justify-center md:justify-start gap-x-3 gap-y-1 text-xs mono-font text-zinc-400">
                    <span id="bpm-display">BPM: --</span>
                    <span>•</span>
                    <span id="scale-display" class="truncate max-w-[150px]">VIBE: --</span>
                </div>
                
                <!-- Simulated Cassette Playback Playlist Progress Slider -->
                <div class="mt-2 w-full">
                    <div class="flex justify-between items-center text-[10px] text-zinc-500 uppercase tracking-wider mb-1 font-semibold mono-font">
                        <span>Track Progress</span>
                        <span id="time-left">04:00</span>
                    </div>
                    <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                        <div id="track-progress-bar" class="w-0 h-full bg-gradient-to-r from-amber-500 to-teal-400 transition-all duration-1000 ease-linear rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            
            <!-- Vibe Mood Selector -->
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mono-font">Harmonic Vibe</label>
                <select id="select-vibe" class="bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:ring-1 focus:ring-amber-500 font-medium">
                    <option value="minor">Melancholic (Natural Minor)</option>
                    <option value="major">Warm & Cozy (Major)</option>
                    <option value="dorian">Hypnotic (Dorian Mode)</option>
                    <option value="phrygian">Mysterious (Phrygian Mode)</option>
                </select>
            </div>

            <!-- Drum Beat Pattern Selector -->
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mono-font">Drum Rhythm Style</label>
                <select id="select-beat" class="bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:ring-1 focus:ring-amber-500 font-medium">
                    <option value="boombap">Classic Boom Bap</option>
                    <option value="chillhop">Slow Organic Chill Hop</option>
                    <option value="garage">Garage Swing Grooves</option>
                    <option value="beatless">Atmospheric Beatless Ambient</option>
                </select>
            </div>

            <!-- Synth Voice Selector -->
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mono-font">Synth Lead Voice</label>
                <select id="select-synth" class="bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:ring-1 focus:ring-amber-500 font-medium">
                    <option value="rhodes">Warm Electric Rhodes</option>
                    <option value="sines">Floating Dream Sines</option>
                    <option value="bells">Filtered Square Bells</option>
                    <option value="plucks">Plucky Triangles</option>
                </select>
            </div>

            <!-- Radio Auto-skip Settings -->
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mono-font">Radio Auto-Skip Interval</label>
                <select id="select-interval" class="bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-sm text-zinc-300 focus:outline-none focus:ring-1 focus:ring-amber-500 font-medium">
                    <option value="30">30 Seconds (Fast Demo Mode)</option>
                    <option value="120">2 Minutes</option>
                    <option value="240" selected>4 Minutes (Standard Radio)</option>
                    <option value="300">5 Minutes</option>
                </select>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-3 gap-3">
                <!-- Transition/Skip Track -->
                <button id="skip-btn" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-400 active:scale-95 transition-all py-3.5 px-4 rounded-2xl font-bold uppercase tracking-wider text-xs border border-zinc-800 flex justify-center items-center gap-2">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    Skip Track
                </button>

                <!-- Primary Play Trigger Toggle -->
                <button id="play-btn" class="col-span-2 bg-gradient-to-r from-amber-500 to-orange-500 hover:brightness-110 text-black active:scale-95 transition-all py-3.5 px-6 rounded-2xl font-extrabold uppercase tracking-widest text-sm flex justify-center items-center gap-2 shadow-lg">
                    <span id="play-btn-icon" class="flex items-center">
                        <svg class="w-4 h-4 fill-current mr-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </span>
                    <span id="play-btn-text">Tune In</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 border-t border-zinc-900 pt-4">
            
            <div class="flex flex-col gap-1 bg-zinc-950 p-2.5 rounded-xl border border-zinc-900/65">
                <div class="flex justify-between items-center text-[10px] text-zinc-500 font-semibold uppercase mono-font">
                    <span>Master Gain</span>
                    <span id="vol-lbl">70%</span>
                </div>
                <input type="range" id="slider-volume" min="0" max="1" step="0.01" value="0.7">
            </div>

            <div class="flex flex-col gap-1 bg-zinc-950 p-2.5 rounded-xl border border-zinc-900/65">
                <div class="flex justify-between items-center text-[10px] text-zinc-500 font-semibold uppercase mono-font">
                    <span>Cozy Rain FX</span>
                    <span id="rain-lbl">40%</span>
                </div>
                <input type="range" id="slider-rain" min="0" max="0.15" step="0.005" value="0.06">
            </div>

            <div class="flex flex-col gap-1 bg-zinc-950 p-2.5 rounded-xl border border-zinc-900/65">
                <div class="flex justify-between items-center text-[10px] text-zinc-500 font-semibold uppercase mono-font">
                    <span>Vinyl Crackle</span>
                    <span id="crackle-lbl">25%</span>
                </div>
                <input type="range" id="slider-crackle" min="0" max="0.04" step="0.002" value="0.01">
            </div>

            <div class="flex flex-col gap-1 bg-zinc-950 p-2.5 rounded-xl border border-zinc-900/65">
                <div class="flex justify-between items-center text-[10px] text-zinc-500 font-semibold uppercase mono-font">
                    <span>Muffled Cutoff</span>
                    <span id="cutoff-lbl">1.8k</span>
                </div>
                <input type="range" id="slider-cutoff" min="500" max="4000" step="50" value="1800">
            </div>
        </div>

        <!-- Graphic visualizer block simulating frequency response -->
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

    </div>

    <script>
        let audioCtx;
        let masterGain;
        let lofiFilter;
        
        // Channel strips
        let crackleSource, crackleGain;
        let rainSource, rainGain;
        let delayNode, delayFeedback;
        let noiseBuffer; // Cached memory resource for performance

        // State machine variables
        let isPlaying = false;
        let isTransitioning = false;
        let transitionTimeout = null;

        // Playback Clock Settings
        let currentStep = 0;
        let measureCount = 0;
        let nextNoteTime = 0.0;
        let bpm = 74;
        const lookahead = 25.0; // ms
        const scheduleAheadTime = 0.12; // s
        let timerID;

        // Playlist progression timers
        let songTimeElapsed = 0; // seconds
        let autoSkipDuration = 240; // seconds (default 4 min)
        let timerIntervalID;

        // Custom Composition Parameter Presets
        const modes = {
            minor: {
                name: "Aeolian (Melancholic)",
                scale: [
                    65.41, 73.42, 77.78, 87.31, 98.00, 103.83, 116.54, // Octave 2 (Bass root nodes)
                    130.81, 146.83, 155.56, 174.61, 196.00, 207.65, 233.08, // Octave 3 (Chord structures)
                    261.63, 293.66, 311.13, 349.23, 392.00, 415.30, 466.16, // Octave 4 (Melody)
                    523.25, 587.33, 622.25, 698.46, 783.99, 830.61, 932.33  // Octave 5
                ],
                progressions: [
                    { chords: [[7, 9, 11], [11, 13, 15], [12, 14, 16], [10, 12, 14]] },
                    { chords: [[7, 9, 11], [12, 14, 16], [9, 11, 13], [11, 13, 15]] }
                ]
            },
            major: {
                name: "Ionian (Warm & Cozy)",
                scale: [
                    65.41, 73.42, 82.41, 87.31, 98.00, 110.00, 123.47,
                    130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94,
                    261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88,
                    523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77
                ],
                progressions: [
                    { chords: [[7, 9, 11], [10, 12, 14], [8, 10, 12], [9, 11, 13]] },
                    { chords: [[7, 9, 11], [9, 11, 13], [10, 12, 14], [10, 12, 14]] }
                ]
            },
            dorian: {
                name: "Dorian (Hypnotic Space)",
                scale: [
                    65.41, 73.42, 77.78, 87.31, 98.00, 110.00, 116.54,
                    130.81, 146.83, 155.56, 174.61, 196.00, 220.00, 233.08,
                    261.63, 293.66, 311.13, 349.23, 392.00, 440.00, 466.16,
                    523.25, 587.33, 622.25, 698.46, 783.99, 880.00, 932.33
                ],
                progressions: [
                    { chords: [[7, 9, 11], [11, 13, 15], [12, 14, 16], [9, 11, 13]] },
                    { chords: [[7, 9, 11], [12, 14, 16], [10, 12, 14], [11, 13, 15]] }
                ]
            },
            phrygian: {
                name: "Phrygian (Mystic Lounge)",
                scale: [
                    65.41, 69.30, 77.78, 87.31, 98.00, 103.83, 116.54,
                    130.81, 138.59, 155.56, 174.61, 196.00, 207.65, 233.08,
                    261.63, 277.18, 311.13, 349.23, 392.00, 415.30, 466.16,
                    523.25, 554.37, 622.25, 698.46, 830.61, 830.61, 932.33
                ],
                progressions: [
                    { chords: [[7, 9, 11], [8, 10, 12], [10, 12, 14], [7, 9, 11]] }
                ]
            }
        };

        // TRACK NAME GENERATION
        const adjectives = ["Midnight", "Autumn", "Distant", "Cozy", "Dreamy", "Rainy", "Tokyo", "Silent", "Lost", "Nostalgic", "Sleepless", "Subway", "Vintage", "Warm", "Urban", "Misty"];
        const nouns = ["Coffee", "Skyline", "Transit", "Memory", "Raindrops", "Drive", "Loft", "Nostalgia", "Window", "Blanket", "Cafe", "Thoughts", "Whisper", "Walk", "Streets", "Station"];

        function makeTrackTitle() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            return `🎧 ${adj} ${noun}`;
        }

        // Selected interactive dynamic presets
        let currentModeKey = "minor";
        let currentBeatStyle = "boombap";
        let currentSynthVoice = "rhodes";
        let activeProgression = null;
        let activeChordIndex = 0;

        // Dom Elements binding
        const selectVibe = document.getElementById('select-vibe');
        const selectBeat = document.getElementById('select-beat');
        const selectSynth = document.getElementById('select-synth');
        const selectInterval = document.getElementById('select-interval');
        const playBtn = document.getElementById('play-btn');
        const playBtnText = document.getElementById('play-btn-text');
        const skipBtn = document.getElementById('skip-btn');
        const trackTitleDisplay = document.getElementById('track-title');
        const clockDisplay = document.getElementById('clock-display');
        const bpmDisplay = document.getElementById('bpm-display');
        const scaleDisplay = document.getElementById('scale-display');
        const progressBar = document.getElementById('track-progress-bar');
        const timeLeftDisplay = document.getElementById('time-left');
        const vinylDisc = document.getElementById('vinyl-disc');
        const visualizerBars = document.querySelectorAll('.bar');

        // Parameter sliders mapping
        const sliderVolume = document.getElementById('slider-volume');
        const sliderRain = document.getElementById('slider-rain');
        const sliderCrackle = document.getElementById('slider-crackle');
        const sliderCutoff = document.getElementById('slider-cutoff');

        function initAudioPipeline() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(parseFloat(sliderVolume.value), audioCtx.currentTime);

            lofiFilter = audioCtx.createBiquadFilter();
            lofiFilter.type = 'lowpass';
            lofiFilter.frequency.setValueAtTime(parseFloat(sliderCutoff.value), audioCtx.currentTime);
            lofiFilter.Q.setValueAtTime(0.5, audioCtx.currentTime);

            // Pre-cache white noise buffer to prevent memory exhaustion
            const bufferSize = audioCtx.sampleRate * 2;
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const channelData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                channelData[i] = Math.random() * 2 - 1;
            }

            // continuous Crackle vinyl simulator
            crackleSource = audioCtx.createBufferSource();
            crackleSource.buffer = noiseBuffer;
            crackleSource.loop = true;
            
            const crackleFilter = audioCtx.createBiquadFilter();
            crackleFilter.type = 'bandpass';
            crackleFilter.frequency.setValueAtTime(1600, audioCtx.currentTime);
            crackleFilter.Q.setValueAtTime(3.5, audioCtx.currentTime);

            crackleGain = audioCtx.createGain();
            crackleGain.gain.setValueAtTime(parseFloat(sliderCrackle.value), audioCtx.currentTime);

            crackleSource.connect(crackleFilter);
            crackleFilter.connect(crackleGain);
            crackleGain.connect(masterGain);
            crackleSource.start();

            // continuous Ambient rain generator
            rainSource = audioCtx.createBufferSource();
            rainSource.buffer = noiseBuffer;
            rainSource.loop = true;

            const rainFilterLow = audioCtx.createBiquadFilter();
            rainFilterLow.type = 'lowpass';
            rainFilterLow.frequency.setValueAtTime(450, audioCtx.currentTime);

            const rainFilterHigh = audioCtx.createBiquadFilter();
            rainFilterHigh.type = 'highpass';
            rainFilterHigh.frequency.setValueAtTime(140, audioCtx.currentTime);

            rainGain = audioCtx.createGain();
            rainGain.gain.setValueAtTime(parseFloat(sliderRain.value), audioCtx.currentTime);

            rainSource.connect(rainFilterLow);
            rainFilterLow.connect(rainFilterHigh);
            rainFilterHigh.connect(rainGain);
            rainGain.connect(masterGain);
            rainSource.start();

            // Create Unified Global Melodic Delay Loop (Prevents feedback memory leaks)
            delayNode = audioCtx.createDelay(3.0);
            const secondsPerBeat = 60.0 / bpm;
            delayNode.delayTime.setValueAtTime(secondsPerBeat * 0.75, audioCtx.currentTime);

            delayFeedback = audioCtx.createGain();
            delayFeedback.gain.setValueAtTime(0.35, audioCtx.currentTime);

            delayNode.connect(delayFeedback);
            delayFeedback.connect(delayNode);
            delayNode.connect(lofiFilter);

            // Final Master out
            lofiFilter.connect(masterGain);
            masterGain.connect(audioCtx.destination);
        }

        function synthKick(time) {
            if (isTransitioning) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(lofiFilter);

            osc.frequency.setValueAtTime(115, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.32);

            gainNode.gain.setValueAtTime(1.0, time);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.32);

            osc.start(time);
            osc.stop(time + 0.32);

            animateVis(0, 30, "var(--neon-orange)");
            animateVis(1, 25, "var(--neon-orange)");
        }

        function synthSnare(time) {
            if (isTransitioning) return;
            // Tonal core
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.connect(oscGain);
            oscGain.connect(lofiFilter);

            osc.frequency.setValueAtTime(175, time);
            oscGain.gain.setValueAtTime(0.3, time);
            oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            osc.start(time);
            osc.stop(time + 0.15);

            // Noise snare crack
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;

            const snareFilter = audioCtx.createBiquadFilter();
            snareFilter.type = 'highpass';
            snareFilter.frequency.setValueAtTime(1200, time);

            const snareGain = audioCtx.createGain();
            snareGain.gain.setValueAtTime(0.28, time);
            snareGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);

            noise.connect(snareFilter);
            snareFilter.connect(snareGain);
            snareGain.connect(lofiFilter);

            noise.start(time);
            noise.stop(time + 0.15);

            animateVis(3, 28, "var(--neon-green)");
            animateVis(4, 24, "var(--neon-green)");
        }

        function synthHiHat(time, isOpen = false) {
            if (isTransitioning) return;
            const noise = audioCtx.createBufferSource();
            noise.buffer = noiseBuffer;

            const hpFilter = audioCtx.createBiquadFilter();
            hpFilter.type = 'bandpass';
            hpFilter.frequency.setValueAtTime(8000, time);

            const hatGain = audioCtx.createGain();
            const duration = isOpen ? 0.22 : 0.04;

            hatGain.gain.setValueAtTime(0.12, time);
            hatGain.gain.exponentialRampToValueAtTime(0.001, time + duration);

            noise.connect(hpFilter);
            hpFilter.connect(hatGain);
            hatGain.connect(lofiFilter);

            noise.start(time);
            noise.stop(time + duration);

            animateVis(isOpen ? 6 : 5, isOpen ? 22 : 12, "var(--neon-teal)");
        }

        function synthChord(time, chordIndices) {
            if (isTransitioning) return;
            const targetMode = modes[currentModeKey];
            if (!targetMode) return;

            chordIndices.forEach(index => {
                const baseFreq = targetMode.scale[index] || 261.63;

                // Stack oscillators for thick, warm analog tone representation
                for (let oscCount = 0; oscCount < 2; oscCount++) {
                    const osc = audioCtx.createOscillator();
                    const oscGain = audioCtx.createGain();

                    // Map voice shapes dynamically
                    if (currentSynthVoice === 'bells') {
                        osc.type = 'square';
                    } else if (currentSynthVoice === 'plucks') {
                        osc.type = 'triangle';
                    } else {
                        osc.type = oscCount === 0 ? 'sine' : 'triangle';
                    }

                    osc.frequency.setValueAtTime(baseFreq, time);
                    // Delicate tape-wobble detuning
                    osc.detune.setValueAtTime((Math.random() - 0.5) * 14, time);

                    osc.connect(oscGain);
                    oscGain.connect(lofiFilter);

                    // Dynamic envelopes according to chosen voice
                    oscGain.gain.setValueAtTime(0, time);
                    if (currentSynthVoice === 'plucks') {
                        oscGain.gain.linearRampToValueAtTime(0.08, time + 0.02);
                        oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.65);
                    } else if (currentSynthVoice === 'bells') {
                        oscGain.gain.linearRampToValueAtTime(0.07, time + 0.05);
                        oscGain.gain.exponentialRampToValueAtTime(0.001, time + 1.2);
                    } else { // Rhodes and Sines
                        oscGain.gain.linearRampToValueAtTime(0.12, time + 0.35);
                        oscGain.gain.setTargetAtTime(0, time + 1.5, 0.7);
                    }

                    osc.start(time);
                    osc.stop(time + 3.8);
                }
            });

            animateVis(2, 25, "var(--neon-peach)");
        }

        function synthBass(time, baseIndex) {
            if (isTransitioning) return;
            const targetMode = modes[currentModeKey];
            if (!targetMode) return;

            const osc = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();

            osc.type = 'triangle';
            // Scale notes down 1 octave for robust bass frequencies
            const bassFreq = targetMode.scale[baseIndex - 7] || targetMode.scale[0];

            osc.frequency.setValueAtTime(bassFreq, time);
            osc.connect(bassGain);
            bassGain.connect(lofiFilter);

            bassGain.gain.setValueAtTime(0, time);
            bassGain.gain.linearRampToValueAtTime(0.32, time + 0.08);
            bassGain.gain.exponentialRampToValueAtTime(0.001, time + 1.6);

            osc.start(time);
            osc.stop(time + 1.6);
        }

        function synthMelody(time) {
            if (isTransitioning) return;
            const targetMode = modes[currentModeKey];
            if (!targetMode) return;

            // Pentatonic pool indices safe for dynamic melodies
            const melIndices = [14, 16, 18, 19, 21, 23, 24];
            const chosenIndex = melIndices[Math.floor(Math.random() * melIndices.length)];
            const freq = targetMode.scale[chosenIndex] || 523.25;

            const osc = audioCtx.createOscillator();
            const melGain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, time);

            osc.connect(melGain);
            melGain.connect(lofiFilter);
            
            // Route melody lines straight into the global delay feedback network
            melGain.connect(delayNode);

            melGain.gain.setValueAtTime(0.0, time);
            melGain.gain.linearRampToValueAtTime(0.08, time + 0.06);
            melGain.gain.exponentialRampToValueAtTime(0.001, time + 0.85);

            osc.start(time);
            osc.stop(time + 0.85);

            animateVis(7, 24, "var(--neon-teal)");
        }

        function stepClock() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat; // Progression index increments by 16th steps

            currentStep++;
            if (currentStep === 16) {
                currentStep = 0;
                measureCount++;

                // Step forward chord structure progression
                if (activeProgression) {
                    activeChordIndex = (activeChordIndex + 1) % activeProgression.chords.length;
                }
            }
        }

        function triggerProceduralStep(step, time) {
            if (!activeProgression) return;

            // 1. Chords and Bass on Downbeat
            if (step === 0) {
                const currentChord = activeProgression.chords[activeChordIndex];
                synthChord(time, currentChord);
                synthBass(time, currentChord[0]);
            }

            // 2. Dynamic Drum Beats Generation
            if (currentBeatStyle === "boombap") {
                // Classic Boom Bap
                if (step === 0 || step === 8 || (step === 11 && Math.random() < 0.4)) {
                    synthKick(time);
                }
                if (step === 4 || step === 12) {
                    synthSnare(time);
                }
                if (step % 2 === 0) {
                    synthHiHat(time, step === 14 && Math.random() < 0.5);
                }
            } else if (currentBeatStyle === "chillhop") {
                // Slow organic chillhop
                if (step === 0 || (step === 10 && Math.random() < 0.35)) {
                    synthKick(time);
                }
                if (step === 4 || step === 12) {
                    synthSnare(time);
                }
                if (step % 4 === 0 || (step % 4 === 2 && Math.random() < 0.3)) {
                    synthHiHat(time, step === 14 && Math.random() < 0.3);
                }
            } else if (currentBeatStyle === "garage") {
                // Swinging garage rhythm
                if (step === 0 || step === 6 || (step === 10 && Math.random() < 0.4)) {
                    synthKick(time);
                }
                if (step === 4 || step === 12) {
                    synthSnare(time);
                }
                // Swing feel hihat hits (accenting odd steps)
                if (step === 0 || step === 3 || step === 6 || step === 9 || step === 12 || step === 15) {
                    synthHiHat(time, step === 9 && Math.random() < 0.5);
                }
            }
            // "beatless" does not play any drum elements

            // 3. Ambient Melodic Sprinkles (Random placement)
            if (Math.random() < 0.16) {
                synthMelody(time);
            }
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                triggerProceduralStep(currentStep, nextNoteTime);
                stepClock();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        function simulateTapeStopAndChange(onDone) {
            if (isTransitioning) return;
            isTransitioning = true;
            clockDisplay.innerText = "DECK: RETRANSLATING";

            // Sweep lofi cutoff all the way down and mute volume to simulate tape deceleration
            const sweepTime = 1.6; // seconds
            if (lofiFilter && masterGain) {
                lofiFilter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + sweepTime);
                masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + sweepTime);
            }

            // Temporarily stop vinyl movement visual
            vinylDisc.classList.remove('vinyl-spin');

            // Apply modifications once muted
            transitionTimeout = setTimeout(() => {
                // Run procedural update callback
                if (onDone) onDone();

                // Re-power deck
                if (lofiFilter && masterGain) {
                    lofiFilter.frequency.setValueAtTime(100, audioCtx.currentTime);
                    lofiFilter.frequency.exponentialRampToValueAtTime(parseFloat(sliderCutoff.value), audioCtx.currentTime + 1.2);
                    masterGain.gain.linearRampToValueAtTime(parseFloat(sliderVolume.value), audioCtx.currentTime + 1.2);
                }

                // Restart vinyl movement
                vinylDisc.classList.add('vinyl-spin');
                isTransitioning = false;
                clockDisplay.innerText = "DECK: BROADCASTING";
            }, sweepTime * 1000);
        }

        function triggerSongChange() {
            simulateTapeStopAndChange(() => {
                // Randomly rotate track details
                const trackName = makeTrackTitle();
                trackTitleDisplay.innerText = trackName;

                // Randomize composition slightly if no user override
                bpm = Math.floor(Math.random() * 15) + 68; // 68 - 83 BPM
                bpmDisplay.innerText = `BPM: ${bpm}`;

                // Gently update delay feedback time to coordinate with the newly generated BPM
                if (audioCtx && delayNode) {
                    const secondsPerBeat = 60.0 / bpm;
                    delayNode.delayTime.setTargetAtTime(secondsPerBeat * 0.75, audioCtx.currentTime, 1.0);
                }

                // Update UI layout parameters
                const targetMode = modes[currentModeKey];
                scaleDisplay.innerText = `VIBE: ${targetMode.name}`;
                activeProgression = targetMode.progressions[Math.floor(Math.random() * targetMode.progressions.length)];
                activeChordIndex = 0;

                // Reset auto-skip elapsed metrics
                songTimeElapsed = 0;
                progressBar.style.width = `0%`;
            });
        }

        function startPlaylistTimer() {
            clearInterval(timerIntervalID);
            timerIntervalID = setInterval(() => {
                if (!isPlaying || isTransitioning) return;

                songTimeElapsed++;
                const percentage = (songTimeElapsed / autoSkipDuration) * 100;
                progressBar.style.width = `${percentage}%`;

                // Calculate display countdown
                const remaining = Math.max(0, autoSkipDuration - songTimeElapsed);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                timeLeftDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (songTimeElapsed >= autoSkipDuration) {
                    triggerSongChange();
                }
            }, 1000);
        }

        function handlePlayToggle() {
            if (!audioCtx) {
                initAudioPipeline();
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isPlaying = !isPlaying;

            if (isPlaying) {
                playBtnText.innerText = "Pause Session";
                playBtn.classList.remove('from-amber-500', 'to-orange-500');
                playBtn.classList.add('from-teal-500', 'to-cyan-500');
                clockDisplay.innerText = "DECK: BROADCASTING";
                
                // Animate elements
                vinylDisc.classList.add('vinyl-spin');

                // Procedural target triggers
                const targetMode = modes[currentModeKey];
                activeProgression = targetMode.progressions[Math.floor(Math.random() * targetMode.progressions.length)];
                activeChordIndex = 0;

                trackTitleDisplay.innerText = makeTrackTitle();
                bpmDisplay.innerText = `BPM: ${bpm}`;
                scaleDisplay.innerText = `VIBE: ${targetMode.name}`;

                nextNoteTime = audioCtx.currentTime + 0.1;
                scheduler();
                startPlaylistTimer();
            } else {
                playBtnText.innerText = "Tune In";
                playBtn.classList.remove('from-teal-500', 'to-cyan-500');
                playBtn.classList.add('from-amber-500', 'to-orange-500');
                clockDisplay.innerText = "DECK: ON HOLD";

                vinylDisc.classList.remove('vinyl-spin');
                clearTimeout(timerID);
                clearInterval(timerIntervalID);
            }
        }

        playBtn.addEventListener('click', handlePlayToggle);

        skipBtn.addEventListener('click', () => {
            if (!isPlaying) {
                // If not playing, instantly trigger tune in and randomize track
                handlePlayToggle();
                return;
            }
            triggerSongChange();
        });

        // Dropdown Parameter Listeners
        selectVibe.addEventListener('change', (e) => {
            currentModeKey = e.target.value;
            const targetMode = modes[currentModeKey];
            scaleDisplay.innerText = `VIBE: ${targetMode.name}`;
            activeProgression = targetMode.progressions[0];
            activeChordIndex = 0;
        });

        selectBeat.addEventListener('change', (e) => {
            currentBeatStyle = e.target.value;
        });

        selectSynth.addEventListener('change', (e) => {
            currentSynthVoice = e.target.value;
        });

        selectInterval.addEventListener('change', (e) => {
            autoSkipDuration = parseInt(e.target.value, 10);
            songTimeElapsed = 0;
            progressBar.style.width = `0%`;
        });

        // Real-time parameter slider updates
        sliderVolume.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('vol-lbl').innerText = `${Math.round(val * 100)}%`;
            if (masterGain && !isTransitioning) {
                masterGain.gain.setValueAtTime(val, audioCtx.currentTime);
            }
        });

        sliderRain.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('rain-lbl').innerText = `${Math.round((val / 0.15) * 100)}%`;
            if (rainGain) {
                rainGain.gain.setValueAtTime(val, audioCtx.currentTime);
            }
        });

        sliderCrackle.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('crackle-lbl').innerText = `${Math.round((val / 0.04) * 100)}%`;
            if (crackleGain) {
                crackleGain.gain.setValueAtTime(val, audioCtx.currentTime);
            }
        });

        sliderCutoff.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('cutoff-lbl').innerText = `${(val / 1000).toFixed(1)}k`;
            if (lofiFilter && !isTransitioning) {
                lofiFilter.frequency.setValueAtTime(val, audioCtx.currentTime);
            }
        });

        function animateVis(index, height, colorClass) {
            const bar = visualizerBars[index];
            if (!bar) return;
            bar.style.height = `${height}px`;
            bar.style.backgroundColor = colorClass;
            setTimeout(() => {
                bar.style.height = '4px';
                bar.style.backgroundColor = 'rgba(63, 63, 70, 0.5)';
            }, 150);
        }

    </script>
</body>
