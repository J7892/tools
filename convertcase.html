<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px; /* Slightly wider to accommodate the row */
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f7f6;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex; /* Changed to flex for tighter horizontal control */
            flex-wrap: nowrap; /* Forces them onto one line */
            gap: 8px;
            justify-content: space-between;
        }

        button {
            flex: 1; /* Allows buttons to grow/shrink equally */
            padding: 10px 4px; /* Reduced padding */
            border: none;
            border-radius: 4px;
            background-color: #3498db;
            color: white;
            font-weight: 600;
            font-size: 13px; /* Smaller font to ensure fit */
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap; /* Prevents text inside buttons from wrapping */
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: translateY(1px);
        }

        .copy-btn {
            background-color: #27ae60;
            margin-top: 15px;
            width: 100%;
            font-size: 16px;
        }

        .copy-btn:hover {
            background-color: #219150;
        }

        /* Mobile fallback: allow wrap only on very small screens */
        @media (max-width: 600px) {
            .button-group {
                flex-wrap: wrap;
            }
            button {
                flex: 1 1 45%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Case Converter</h1>
        
        <textarea id="textInput" placeholder="Type or paste your content here..."></textarea>

        <div class="button-group">
            <button onclick="convert('sentence')">Sentence case</button>
            <button onclick="convert('lower')">lower case</button>
            <button onclick="convert('upper')">UPPER CASE</button>
            <button onclick="convert('capitalized')">Capitalized</button>
            <button onclick="convert('title')">Title Case</button>
        </div>

        <button class="copy-btn" onclick="copyText()">Copy to Clipboard</button>
    </div>

    <script>
        const textInput = document.getElementById('textInput');

        const transformers = {
            sentence: (str) => {
                return str.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, (match) => match.toUpperCase());
            },
            lower: (str) => str.toLowerCase(),
            upper: (str) => str.toUpperCase(),
            capitalized: (str) => {
                return str.toLowerCase().replace(/\b\w/g, (match) => match.toUpperCase());
            },
            title: (str) => {
                const minorWords = ['a', 'an', 'and', 'as', 'at', 'but', 'by', 'en', 'for', 'if', 'in', 'of', 'on', 'or', 'the', 'to', 'v', 'via', 'vs'];
                return str.toLowerCase().split(' ').map((word, index, array) => {
                    if (index > 0 && index < array.length - 1 && minorWords.includes(word)) {
                        return word;
                    }
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }).join(' ');
            }
        };

        function convert(type) {
            const currentText = textInput.value;
            if (!currentText) return;
            textInput.value = transformers[type](currentText);
        }

        function copyText() {
            textInput.select();
            document.execCommand('copy');
            alert('Text copied to clipboard!');
        }
    </script>

</body>
</html>
