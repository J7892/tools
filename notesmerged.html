<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Notes</title>
    
    <link href="quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --sidebar-bg: white;
            --editor-bg: white;
            --text-color: #333;
            --secondary-text: #888;
            --border-color: #ddd;
            --item-hover: #f0f0f0;
            --toolbar-bg: #fff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --sidebar-bg: #2d2d2d;
            --editor-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --secondary-text: #aaa;
            --border-color: #444;
            --item-hover: #3d3d3d;
            --toolbar-bg: #333;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg-color); color: var(--text-color);
            height: 100vh; overflow: hidden; display: flex; 
        }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease, background 0.3s; 
            margin-left: -280px; height: 100vh; z-index: 2000;
        }
        .sidebar.open { margin-left: 0; }
        .search-container { margin-bottom: 10px; }
        #sidebar-search { 
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 0.85em; 
            background: var(--editor-bg); color: var(--text-color);
        }
        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { 
            padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 4px; transition: background 0.2s;
        }
        .note-item:hover { background: var(--item-hover); }
        .note-item.active { background: var(--item-hover); border-left: 4px solid #007bff; }

        /* Main Layout Containers */
        .main-layout { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }

        /* TickTick Frame Styling */
        #todo-container { 
            height: 40%; width: 100%; overflow: hidden; position: relative; flex-shrink: 0; 
            border-bottom: 1px solid var(--border-color); display: none; /* Hidden by default */
        }
        #todo-container.visible { display: block; }
        #todo-frame { 
            position: absolute; top: 0; left: 0; width: 125%; height: 125%; 
            transform: scale(0.8); transform-origin: top left; border: none; 
        }

        /* Editor Area */
        .editor-area { 
            flex-grow: 1; background: var(--editor-bg); 
            display: flex; flex-direction: column; padding: 10px 40px 10px 60px; 
            position: relative; min-width: 0; align-items: center; transition: background 0.3s; 
        }
        
        .content-width-wrapper { width: 100%; max-width: 100%; display: flex; flex-direction: column; flex-grow: 1; min-height: 0; transition: max-width 0.3s ease; }
        .content-width-wrapper.narrow { max-width: 800px; }

        .editor-content-wrapper { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; overflow: visible; margin-top: 10px;}
        
        /* Custom Toolbar Wrapper */
        .custom-toolbar-wrapper {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--toolbar-bg); border: 1px solid var(--border-color);
            border-bottom: none; border-top-left-radius: 4px; border-top-right-radius: 4px;
            padding-right: 12px; width: 100%;
        }

        .ql-toolbar.ql-snow { 
            border: none !important; flex-grow: 1; padding: 8px 12px !important; 
            display: flex; align-items: center; flex-wrap: nowrap; overflow-x: auto; 
        }

        .native-new-btn {
            background-color: #007bff; color: white; border: none; border-radius: 4px;
            padding: 0 16px; font-weight: 600; font-size: 13px; cursor: pointer;
            height: 32px; white-space: nowrap; flex-shrink: 0; 
            display: flex; align-items: center; justify-content: center;
        }

        .toggle-sidebar { 
            background: #333; color: white; padding: 0 15px; cursor: pointer; 
            border-radius: 0 4px 4px 0; border: none; font-size: 1.2em; height: 50px; 
            display: flex; align-items: center; justify-content: center;
            position: absolute; left: 0; top: 10px; z-index: 1100;
        }

        .ql-container.ql-snow {
            border: 1px solid var(--border-color) !important;
            border-bottom-left-radius: 4px; border-bottom-right-radius: 4px;
        }

        .ql-editor { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; line-height: 1.3; }
        
        /* Apple Notes Title Style */
        .ql-editor > *:first-child {
            font-size: 1.5em !important; font-weight: bold !important;
            margin-bottom: 0.5em !important; line-height: 1.2 !important;
        }

        .bottom-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 0; border-top: 1px solid var(--border-color); margin-top: 5px; 
            width: 100%; flex-shrink: 0; background: var(--editor-bg);
        }

        .btn-tool { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--editor-bg); color: var(--text-color); padding: 25px;
            border-radius: 8px; border: 1px solid var(--border-color); text-align: center; max-width: 400px;
        }

        @media (max-width: 768px) {
            .editor-area { padding: 5px; } 
            .toggle-sidebar { position: static; height: 32px; width: 36px; padding: 0; margin-right: 4px; border-radius: 4px; }
            .native-new-btn .btn-text { display: none; }
            .native-new-btn { padding: 0; width: 32px; font-size: 18px; }
            #todo-container { height: 30%; }
        }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <button class="native-new-btn" style="width:100%; margin-bottom:10px;" onclick="createNewNote()">+ New Note</button>
        <div class="search-container">
            <input type="text" id="sidebar-search" placeholder="Search..." oninput="renderNoteList()">
        </div>
        <div id="note-list" class="note-list"></div>
        <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn-tool" style="width:100%; margin-bottom:5px;" onclick="exportNotes()">Backup Database</button>
            <button class="btn-tool" style="width:100%;" onclick="document.getElementById('import-input').click()">Import Backup</button>
            <input type="file" id="import-input" style="display:none" onchange="importNotes(event)">
        </div>
    </div>

    <div class="main-layout">
        <div id="todo-container">
            <iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe>
        </div>

        <div class="editor-area">
            <div id="width-wrapper" class="content-width-wrapper">
                <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                <div class="editor-content-wrapper">
                    <div id="editor-container"></div>
                </div>
                <div class="bottom-bar">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span id="status" style="font-size:0.8em; font-weight:600;">Saved</span>
                        <button class="btn-tool" onclick="toggleTickTick()" id="ticktick-toggle">📅 Show Tasks</button>
                        <button class="btn-tool" onclick="toggleTheme()" id="theme-toggle">🌙 Dark</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-tool" onclick="copyNote()">Copy</button>
                        <select id="width-select" onchange="setWidth(this.value)" style="font-size:0.75em;">
                            <option value="full">Full Width</option>
                            <option value="narrow">Narrow (Centered)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="backup-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Daily Backup</h3>
            <p>Don't forget to save your daily database backup to OneDrive.</p>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                <button onclick="dismissBackupPrompt()">Later</button>
                <button class="native-new-btn" onclick="executePromptedBackup()">Backup Now</button>
            </div>
        </div>
    </div>

<script src="quill.js"></script>
<script>
    const APP_VERSION = 1.1;
    let currentNoteId = null;
    let saveTimeout = null;
    let isDirty = false;

    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: {
                container: [[{ 'size': ['small', false, 'large', 'huge'] }], ['bold', 'italic'], ['link'], ['clean']],
            }
        },
        theme: 'snow'
    });

    // Toolbar Reconstruction
    const toolbarEl = document.querySelector('.ql-toolbar');
    const customWrapper = document.createElement('div');
    customWrapper.className = 'custom-toolbar-wrapper';
    toolbarEl.parentNode.insertBefore(customWrapper, toolbarEl);
    customWrapper.appendChild(document.querySelector('.toggle-sidebar'));
    customWrapper.appendChild(toolbarEl);

    const nativeBtn = document.createElement('button');
    nativeBtn.className = 'native-new-btn';
    nativeBtn.innerHTML = '<span class="plus-sign">+</span><span class="btn-text">&nbsp;NEW NOTE</span>';
    nativeBtn.onclick = createNewNote;
    customWrapper.appendChild(nativeBtn);

    function toggleTickTick() {
        const container = document.getElementById('todo-container');
        const btn = document.getElementById('ticktick-toggle');
        const isVisible = container.classList.toggle('visible');
        btn.innerText = isVisible ? "📅 Hide Tasks" : "📅 Show Tasks";
        localStorage.setItem('ticktick-pref', isVisible);
    }

    function createNewNote() {
        currentNoteId = Date.now();
        const today = new Date();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const dateText = `${mm}-${dd} - `;
        quill.setText(`${dateText}\n\n`, 'user');
        quill.setSelection(dateText.length, 0);
        quill.focus();
    }

    function checkBackupPrompt() {
        if (sessionStorage.getItem('backup-prompt-dismissed')) return;
        const lastBackup = localStorage.getItem('last-backup-date');
        const now = new Date().getTime();
        if (!lastBackup || (now - new Date(lastBackup).getTime() > 86400000)) {
            document.getElementById('backup-modal').classList.add('active');
        }
    }

    function exportNotes() {
        const raw = localStorage.getItem('my-github-notes');
        const blob = new Blob([raw], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        localStorage.setItem('last-backup-date', new Date().toISOString());
    }

    function executePromptedBackup() { exportNotes(); dismissBackupPrompt(); }
    function dismissBackupPrompt() { 
        sessionStorage.setItem('backup-prompt-dismissed', 'true');
        document.getElementById('backup-modal').classList.remove('active'); 
    }

    function getNotesSafely() {
        try {
            const raw = localStorage.getItem('my-github-notes');
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : (parsed.data || []);
        } catch (e) { return []; }
    }

    function saveNotesInternal(notes) {
        localStorage.setItem('my-github-notes', JSON.stringify({ version: APP_VERSION, data: notes }));
        renderNoteList();
    }

    quill.on('text-change', (delta, old, source) => {
        if (source === 'user') {
            document.getElementById('status').innerText = "Saving...";
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(autoSave, 1000);
        }
    });

    function autoSave() {
        let fullText = quill.getText().trim();
        let firstLine = fullText.split('\n')[0].trim() || 'Untitled Note';
        let notes = getNotesSafely();
        const noteData = { id: currentNoteId || Date.now(), title: firstLine, content: quill.getContents(), date: new Date().toISOString() };
        const idx = notes.findIndex(n => n.id === currentNoteId);
        if (idx > -1) notes[idx] = noteData; else { notes.push(noteData); currentNoteId = noteData.id; }
        saveNotesInternal(notes);
        localStorage.setItem('last-note-id', currentNoteId);
        document.getElementById('status').innerText = "Saved";
    }

    function renderNoteList() {
        const list = document.getElementById('note-list');
        list.innerHTML = '';
        const notes = getNotesSafely();
        const searchTerm = document.getElementById('sidebar-search').value.toLowerCase();
        notes.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(note => {
            if (searchTerm && !note.title.toLowerCase().includes(searchTerm)) return;
            const div = document.createElement('div');
            div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
            div.innerHTML = `<div style="flex-grow:1" onclick="loadNote(${note.id})"><b>${note.title}</b></div>`;
            list.appendChild(div);
        });
    }

    function loadNote(id) {
        const note = getNotesSafely().find(n => n.id === id);
        if (note) { currentNoteId = note.id; quill.setContents(note.content); renderNoteList(); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function setWidth(mode) { document.getElementById('width-wrapper').className = `content-width-wrapper ${mode}`; }
    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('theme-toggle').innerText = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    function copyNote() {
        navigator.clipboard.writeText(quill.getText()).then(() => alert("Copied!"));
    }

    window.onload = () => {
        renderNoteList();
        if (localStorage.getItem('ticktick-pref') === 'true') toggleTickTick();
        const lastId = localStorage.getItem('last-note-id');
        if (lastId) loadNote(parseInt(lastId)); else createNewNote();
        setTimeout(checkBackupPrompt, 1500);
    };
</script>
</body>
</html>
