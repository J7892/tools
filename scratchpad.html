<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Scratchpad</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --border-color: #ccc;
            --toolbar-bg: #fff;
            --max-narrow: 700px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
        }

        /* Width Toggle Controls */
        #width-controls {
            background: #fff;
            padding: 8px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        /* App Layout */
        #app-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            margin: 0 auto;
            background: #fff;
            width: 100%; 
            height: 100%;
            overflow: hidden;
        }

        /* Narrow Mode Class */
        #app-wrapper.narrow-mode {
            max-width: var(--max-narrow);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin: 20px auto;
            height: calc(100% - 100px);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* Editor and Paragraph Spacing */
        #editor {
            flex-grow: 1;
            font-size: 16px;
            border: none !important;
        }

        /* This specifically adds spacing between paragraphs */
        .ql-editor p {
            margin-bottom: 1.2em !important;
        }

        /* Bottom Status Bar */
        #status-bar {
            background: var(--toolbar-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            gap: 10px;
        }

        .stats-group {
            display: flex;
            gap: 15px;
            color: #555;
        }

        .actions-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            background: #f8f9fa;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 12px;
        }

        button:hover {
            background: #e9ecef;
        }

        /* Mobile/Narrow Logic */
        @media (max-width: 768px) {
            #width-controls {
                display: none;
            }
            #app-wrapper.narrow-mode, #app-wrapper {
                width: calc(100% - 20px);
                margin: 10px auto !important;
                height: calc(100% - 20px) !important;
                max-width: none;
            }
            #status-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div id="width-controls">
    <label>
        <input type="radio" name="width-toggle" value="wide" checked onchange="toggleWidth('wide')"> Wide
    </label>
    <label>
        <input type="radio" name="width-toggle" value="narrow" onchange="toggleWidth('narrow')"> Narrow
    </label>
</div>

<div id="app-wrapper">
    <div id="editor"></div>
    
    <div id="status-bar">
        <div class="stats-group">
            <span id="char-count">Chars: 0</span>
            <span id="word-count">Words: 0</span>
            <span id="line-calc">Lines: 0</span>
        </div>
        <div class="actions-group">
            <button onclick="copyToClipboard()">Copy</button>
            <button onclick="exportToEmail()">Email</button>
            <button onclick="exportToFile()">Export</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Initialize Quill
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'background': [] }], 
                ['clean']
            ]
        },
        placeholder: 'Write something...'
    });

    // --- Width Toggling ---
    function toggleWidth(mode) {
        const wrapper = document.getElementById('app-wrapper');
        if (mode === 'narrow') {
            wrapper.classList.add('narrow-mode');
        } else {
            wrapper.classList.remove('narrow-mode');
        }
    }

    // --- Local Storage Logic ---
    const STORAGE_KEY = 'scratchpad_content';
    const savedContent = localStorage.getItem(STORAGE_KEY);
    if (savedContent) {
        quill.setContents(JSON.parse(savedContent));
    }

    quill.on('text-change', () => {
        const delta = quill.getContents();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(delta));
        updateStats();
        handleMarkdownHighlight();
    });

    // --- Markdown Highlight Logic (//) ---
    function handleMarkdownHighlight() {
        const text = quill.getText();
        if (text.includes('//')) {
            let index = text.indexOf('//');
            while (index !== -1) {
                const currentFormat = quill.getFormat(index, 2);
                const isHighlighted = currentFormat.background === 'yellow' || currentFormat.background === '#ffff00';

                quill.deleteText(index, 2);
                quill.formatText(index, text.length - index, 'background', isHighlighted ? false : 'yellow', 'user');
                
                const updatedText = quill.getText();
                index = updatedText.indexOf('//');
            }
        }
    }

    // --- Statistics Logic ---
    function updateStats() {
        const text = quill.getText().trim();
        const charCount = text.length;
        const words = text.length > 0 ? text.split(/\s+/).length : 0;
        const lineCalc = Math.ceil((words / 5) / 5) * 5;

        document.getElementById('char-count').innerText = `Chars: ${charCount}`;
        document.getElementById('word-count').innerText = `Words: ${words}`;
        document.getElementById('line-calc').innerText = `Lines: ${lineCalc}`;
    }

    // --- Actions ---
    function copyToClipboard() {
        const text = quill.getText();
        navigator.clipboard.writeText(text).then(() => alert("Copied!"));
    }

    function exportToEmail() {
        const body = encodeURIComponent(quill.getText());
        window.location.href = `mailto:?subject=Scratchpad&body=${body}`;
    }

    function exportToFile() {
        const htmlContent = `<html><head><style>.ql-editor p { margin-bottom: 1.2em; }</style></head><body>${quill.root.innerHTML}</body></html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'scratchpad.html';
        a.click();
    }

    updateStats();
</script>

</body>
</html>
