<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchpad</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --border-color: #ccc;
            --toolbar-bg: #fff;
            --max-narrow: 700px;
            --highlight-color: #ffff00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* App Layout Container */
        #app-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease-in-out;
            margin: 0 auto;
            background: #fff;
            width: 100%; 
            height: 100%;
            overflow: hidden;
            padding: 0 10px;
            box-sizing: border-box;
        }

        #app-wrapper.narrow-mode {
            max-width: var(--max-narrow);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin: 10px auto; 
            height: calc(100% - 20px);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            padding: 0; 
        }

        #editor {
            flex-grow: 1;
            font-size: 16px;
            border: none !important;
        }

        .ql-editor p {
            margin-bottom: 0.6em !important;
        }

        /* Bottom Status Bar */
        #status-bar {
            background: var(--toolbar-bg);
            border-top: 1px solid var(--border-color);
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            gap: 10px;
            z-index: 10;
        }

        .stats-group {
            display: flex;
            gap: 12px;
            color: #555;
            font-weight: 500;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            align-items: center;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            padding: 0 15px;
        }

        .actions-group {
            display: flex;
            gap: 6px;
        }

        button {
            padding: 4px 10px;
            cursor: pointer;
            background: #f8f9fa;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 11px;
        }

        button:hover {
            background: #e9ecef;
        }

        /* Responsive Hiding */
        @media (max-width: 768px) {
            .toggle-group {
                display: none;
            }
            #app-wrapper.narrow-mode, #app-wrapper {
                width: 100%;
                margin: 0 !important;
                height: 100% !important;
                max-width: none;
                border: none;
                border-radius: 0;
            }
            #status-bar {
                padding: 10px;
            }
        }

        /* Force Quill highlight button to look active when yellow is set */
        .ql-snow .ql-toolbar button.ql-background[value="#ffff00"] {
            background-color: #ffff00;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="editor"></div>
    
    <div id="status-bar">
        <div class="stats-group">
            <span id="char-count">Chars: 0</span>
            <span id="word-count">Words: 0</span>
            <span id="line-calc">Lines: 0</span>
        </div>

        <div class="toggle-group">
            <label>
                <input type="radio" name="width-toggle" value="wide" checked onchange="toggleWidth('wide')"> Wide
            </label>
            <label>
                <input type="radio" name="width-toggle" value="narrow" onchange="toggleWidth('narrow')"> Narrow
            </label>
        </div>

        <div class="actions-group">
            <button onclick="copyToClipboard()">Copy</button>
            <button onclick="exportToEmail()">Email</button>
            <button onclick="exportToFile()">Export</button>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Initialize Quill with simplified background button
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [
                    ['bold', 'italic', 'underline'],
                    [{ 'background': ['#ffff00'] }], // Only Yellow allowed
                    ['clean']
                ]
            }
        },
        placeholder: 'Write something...'
    });

    function toggleWidth(mode) {
        const wrapper = document.getElementById('app-wrapper');
        if (mode === 'narrow') {
            wrapper.classList.add('narrow-mode');
        } else {
            wrapper.classList.remove('narrow-mode');
        }
    }

    const STORAGE_KEY = 'scratchpad_content';
    const savedContent = localStorage.getItem(STORAGE_KEY);
    if (savedContent) {
        quill.setContents(JSON.parse(savedContent));
    }

    // Main event listener
    quill.on('text-change', (delta, oldDelta, source) => {
        if (source === 'user') {
            handleMarkdownHighlight();
        }
        updateStats();
        
        // Auto-save
        const content = quill.getContents();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(content));
    });

    function handleMarkdownHighlight() {
        const text = quill.getText();
        const index = text.indexOf('//');
        
        if (index !== -1) {
            // Determine current state of highlight at that position
            const format = quill.getFormat(index, 2);
            const isCurrentlyHighlighted = format.background === '#ffff00' || format.background === 'yellow';

            // Remove the // characters
            quill.deleteText(index, 2);

            // Toggle highlight for the cursor's current formatting
            // This affects subsequent typing
            quill.format('background', isCurrentlyHighlighted ? false : '#ffff00');
        }
    }

    function updateStats() {
        const text = quill.getText().trim();
        const charCount = text.length;
        const words = text.length > 0 ? text.split(/\s+/).length : 0;
        const lineCalc = Math.ceil((words / 5) / 5) * 5;

        document.getElementById('char-count').innerText = `Chars: ${charCount}`;
        document.getElementById('word-count').innerText = `Words: ${words}`;
        document.getElementById('line-calc').innerText = `Lines: ${lineCalc}`;
    }

    function copyToClipboard() {
        const text = quill.getText();
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('button[onclick="copyToClipboard()"]');
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 1500);
        });
    }

    function exportToEmail() {
        const body = encodeURIComponent(quill.getText());
        window.location.href = `mailto:?subject=Scratchpad Export&body=${body}`;
    }

    function exportToFile() {
        const htmlContent = `<html><head><meta charset="utf-8"><style>body{font-family:sans-serif;padding:20px;}.ql-editor p{margin-bottom:0.6em;}</style></head><body>${quill.root.innerHTML}</body></html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'scratchpad.html';
        a.click();
    }

    updateStats();
</script>

</body>
</html>
