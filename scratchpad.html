<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchpad</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --border-color: #ccc;
            --toolbar-bg: #fff;
            --max-narrow: 700px;
            --highlight-color: #ffff00;
            /* Global text size variable */
            --editor-font-size: 16px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* App Layout Container */
        #app-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease-in-out;
            margin: 0 auto;
            background: #fff;
            width: 100%; 
            height: 100%;
            overflow: hidden;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* Narrow Mode - Default */
        #app-wrapper.narrow-mode {
            max-width: var(--max-narrow);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin: 10px auto; 
            height: calc(100% - 20px);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            padding: 0; 
        }

        /* Toolbar Custom Styling */
        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid var(--border-color) !important;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            padding: 8px !important;
        }

        /* Custom Font Selector in Top Toolbar */
        .custom-size-container {
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #444;
        }

        .custom-size-container select {
            padding: 2px 4px;
            font-size: 12px;
            cursor: pointer;
        }

        #editor {
            flex-grow: 1;
            font-size: var(--editor-font-size) !important;
            border: none !important;
        }

        /* Global formatting */
        .ql-editor {
            font-size: var(--editor-font-size) !important;
        }

        .ql-editor p {
            margin-bottom: 0.6em !important;
        }

        /* Bottom Status Bar */
        #status-bar {
            background: var(--toolbar-bg);
            border-top: 1px solid var(--border-color);
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            gap: 10px;
            z-index: 10;
        }

        .stats-group {
            display: flex;
            gap: 12px;
            color: #555;
            font-weight: 500;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .actions-group {
            display: flex;
            gap: 6px;
        }

        button.action-btn {
            padding: 4px 10px;
            cursor: pointer;
            background: #f8f9fa;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 11px;
        }

        button.action-btn:hover {
            background: #e9ecef;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .toggle-label-text {
                display: none; 
            }
            #app-wrapper.narrow-mode, #app-wrapper {
                width: 100%;
                margin: 0 !important;
                height: 100% !important;
                max-width: none;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div id="app-wrapper" class="narrow-mode">
    <div id="editor"></div>
    
    <div id="status-bar">
        <div class="stats-group">
            <span id="char-count">Chars: 0</span>
            <span id="word-count">Words: 0</span>
            <span id="line-calc">Lines: 0</span>
        </div>

        <div class="toggle-group">
            <label><input type="radio" name="width-toggle" value="wide" onchange="toggleWidth('wide')"> <span class="toggle-label-text">Wide</span></label>
            <label><input type="radio" name="width-toggle" value="narrow" checked onchange="toggleWidth('narrow')"> <span class="toggle-label-text">Narrow</span></label>
        </div>

        <div class="actions-group">
            <button class="action-btn" onclick="copyToClipboard()">Copy</button>
            <button class="action-btn" onclick="exportToEmail()">Email</button>
            <button class="action-btn" onclick="exportToFile()">Export</button>
        </div>
    </div>
</div>

<template id="size-selector-template">
    <div class="custom-size-container">
        <span>Size:</span>
        <select id="size-select" onchange="updateTextSize(this.value)">
            <option value="13px">Small</option>
            <option value="16px" selected>Normal</option>
            <option value="20px">Large</option>
            <option value="28px">Huge</option>
        </select>
    </div>
</template>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Initialize Quill
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'background': ['#ffff00'] }], // Only Yellow
                ['clean']
            ]
        },
        placeholder: 'Write something...'
    });

    // --- Inject Text Size Selector into Top Toolbar ---
    const toolbar = document.querySelector('.ql-toolbar');
    const template = document.getElementById('size-selector-template');
    toolbar.appendChild(template.content.cloneNode(true));

    // --- Global Text Size Logic ---
    function updateTextSize(size) {
        document.documentElement.style.setProperty('--editor-font-size', size);
        localStorage.setItem('scratchpad_text_size', size);
        // Sync the select value if called programmatically
        document.getElementById('size-select').value = size;
    }

    // Load saved preference
    const savedSize = localStorage.getItem('scratchpad_text_size');
    if (savedSize) {
        updateTextSize(savedSize);
    }

    // --- Width Toggling ---
    function toggleWidth(mode) {
        const wrapper = document.getElementById('app-wrapper');
        if (mode === 'narrow') {
            wrapper.classList.add('narrow-mode');
        } else {
            wrapper.classList.remove('narrow-mode');
        }
    }

    // --- Persistence ---
    const STORAGE_KEY = 'scratchpad_content';
    const savedContent = localStorage.getItem(STORAGE_KEY);
    if (savedContent) {
        quill.setContents(JSON.parse(savedContent));
    }

    quill.on('text-change', (delta, oldDelta, source) => {
        if (source === 'user') {
            handleMarkdownHighlight();
        }
        updateStats();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(quill.getContents()));
    });

    // --- "//" Markdown Highlight Logic ---
    function handleMarkdownHighlight() {
        const text = quill.getText();
        const index = text.indexOf('//');
        if (index !== -1) {
            const format = quill.getFormat(index, 2);
            const isHighlighted = format.background === '#ffff00' || format.background === 'yellow';
            
            // Delete the slashes
            quill.deleteText(index, 2);
            
            // Toggle highlight state for future typing
            quill.format('background', isHighlighted ? false : '#ffff00');
        }
    }

    // --- Stats ---
    function updateStats() {
        const text = quill.getText().trim();
        const words = text.length > 0 ? text.split(/\s+/).length : 0;
        const lineCalc = Math.ceil((words / 5) / 5) * 5;
        document.getElementById('char-count').innerText = `Chars: ${text.length}`;
        document.getElementById('word-count').innerText = `Words: ${words}`;
        document.getElementById('line-calc').innerText = `Lines: ${lineCalc}`;
    }

    // --- Actions ---
    function copyToClipboard() {
        navigator.clipboard.writeText(quill.getText()).then(() => {
            const btn = document.querySelector('button[onclick="copyToClipboard()"]');
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 1500);
        });
    }

    function exportToEmail() {
        const body = encodeURIComponent(quill.getText());
        window.location.href = `mailto:?subject=Scratchpad Export&body=${body}`;
    }

    function exportToFile() {
        const currentSize = getComputedStyle(document.documentElement).getPropertyValue('--editor-font-size');
        const htmlContent = `<html><head><meta charset="utf-8"><style>body{font-family:sans-serif;padding:20px;font-size:${currentSize};}.ql-editor p{margin-bottom:0.6em;}</style></head><body>${quill.root.innerHTML}</body></html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'scratchpad.html';
        a.click();
    }

    updateStats();
</script>

</body>
</html>
