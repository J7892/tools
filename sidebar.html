<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    
    <link href="quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --sidebar-bg: white;
            --editor-bg: white;
            --text-color: #333;
            --secondary-text: #888;
            --border-color: #ddd;
            --item-hover: #f0f0f0;
            --toolbar-bg: #fff;
            --danger: #d9534f;
            --highlight: #ffff00;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg-color); color: var(--text-color);
            height: 100vh; overflow: hidden; display: flex; 
        }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease; 
            margin-left: -280px; height: 100vh; z-index: 2000;
        }
        .sidebar.open { margin-left: 0; }
        .search-container { margin-bottom: 10px; }
        #sidebar-search { 
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 0.85em; 
            background: var(--editor-bg); color: var(--text-color);
        }
        #sidebar-search:focus { border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.1); }

        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { 
            padding: 12px 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 4px; transition: background 0.2s;
        }
        .note-item:hover { background: var(--item-hover); }
        .note-item.active { background: var(--item-hover); border-left: 4px solid #007bff; }
        
        .delete-btn { 
            color: var(--secondary-text); font-weight: bold; padding: 2px 8px; 
            visibility: hidden; cursor: pointer; font-size: 16px; border-radius: 4px;
        }
        .delete-btn:hover { color: var(--danger); background: rgba(217, 83, 79, 0.1); }
        .note-item:hover .delete-btn { visibility: visible; }

        /* Main Layout */
        .main-layout { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }

        #todo-container { height: 40%; width: 100%; overflow: hidden; position: relative; flex-shrink: 0; display: none; }
        #todo-container.visible { display: block; }
        #todo-container.fullscreen { flex-grow: 1; height: auto !important; border-bottom: none; }
        
        #todo-frame { 
            position: absolute; top: 0; left: 0; width: 125%; height: 125%; 
            transform: scale(0.8); transform-origin: top left; border: none; 
        }
        
        #ghost-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 9; }

        #resizer { 
            height: 8px; background: #f8f9fa; border-top: 1px solid var(--border-color); 
            border-bottom: 1px solid var(--border-color); cursor: row-resize; width: 100%; 
            z-index: 10; flex-shrink: 0; display: none; justify-content: center; align-items: center;
        }
        #resizer.visible { display: flex; }
        #resizer::after { content: ""; width: 32px; height: 3px; background: #ced4da; border-radius: 3px; }

        .editor-area { 
            flex-grow: 1; background: var(--editor-bg); 
            display: flex; flex-direction: column; padding: 10px 40px 10px 60px; 
            position: relative; min-width: 0; align-items: center; 
        }
        .editor-area.hidden { display: none; }
        
        .content-width-wrapper { width: 100%; max-width: 100%; display: flex; flex-direction: column; flex-grow: 1; min-height: 0; transition: max-width 0.3s ease; }
        .content-width-wrapper.narrow { max-width: 800px; }

        .editor-content-wrapper { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; overflow: visible; margin-top: 10px;}
        
        .custom-toolbar-wrapper { display: flex; justify-content: space-between; align-items: center; background: var(--toolbar-bg); border: 1px solid var(--border-color); border-bottom: none; border-top-left-radius: 4px; border-top-right-radius: 4px; padding-right: 12px; width: 100%; }
        .ql-toolbar.ql-snow { border: none !important; flex-grow: 1; padding: 8px 12px !important; display: flex; align-items: center; flex-wrap: nowrap; overflow-x: auto; }
        .ql-toolbar.ql-snow::-webkit-scrollbar { display: none; }

        .ql-highlight { position: relative; width: 28px !important; }
        .ql-highlight::after { 
            content: "H"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--highlight); padding: 0 5px; border-radius: 2px; border: 1px solid #ccc; 
            font-weight: bold; color: #333; font-size: 12px; pointer-events: none;
        }

        .native-new-btn { background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 0 16px; font-weight: 600; font-size: 13px; cursor: pointer; height: 32px; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .toggle-sidebar { background: #333; color: white; padding: 0 15px; cursor: pointer; border-radius: 0 4px 4px 0; border: none; font-size: 1.2em; height: 50px; display: flex; align-items: center; justify-content: center; position: absolute; left: 0; top: 10px; z-index: 1100; }

        .ql-container.ql-snow { border: 1px solid var(--border-color) !important; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
        .ql-editor { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; line-height: 1.4; }
        
        .ql-editor p { margin-bottom: 1.2em !important; }
        .ql-editor p:last-child { margin-bottom: 0 !important; }
        .ql-editor > *:first-child { font-size: 1.5em !important; font-weight: bold !important; margin-bottom: 0.8em !important; line-height: 1.2 !important; }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid var(--border-color); margin-top: 5px; width: 100%; flex-shrink: 0; background: var(--editor-bg); }
        .btn-tool { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        .radio-group { display: flex; gap: 10px; align-items: center; font-size: 0.75em; color: var(--secondary-text); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }

        /* Full page Task Footer Toolbar */
        #task-only-footer { 
            display: none; height: 40px; background: #fff; border-top: 1px solid var(--border-color);
            align-items: center; padding: 0 20px; justify-content: flex-end; z-index: 1001; flex-shrink: 0;
        }
        #task-only-footer.visible { display: flex; }

        @media (max-width: 768px) {
            .editor-area { padding: 5px; } 
            .toggle-sidebar { position: static; height: 32px; width: 36px; padding: 0; margin-right: 4px; border-radius: 4px; }
            .native-new-btn .btn-text { display: none; }
            .native-new-btn { padding: 0; width: 32px; font-size: 18px; }
            #todo-container { height: 30% !important; }
            .radio-group { display: none; }
            #resizer { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <button class="native-new-btn" style="width:100%; margin-bottom:10px;" onclick="createNewNote()">+ New Note</button>
        <div class="search-container">
            <input type="text" id="sidebar-search" placeholder="Search titles & content..." oninput="renderNoteList()">
        </div>
        <div id="note-list" class="note-list"></div>
        <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn-tool" style="width:100%; margin-bottom:5px;" onclick="exportNotes()">Backup Database</button>
            <button class="btn-tool" style="width:100%;" onclick="document.getElementById('import-input').click()">Import Backup</button>
            <input type="file" id="import-input" style="display:none" onchange="importNotes(event)">
        </div>
    </div>

    <div class="main-layout">
        <div id="todo-container">
            <iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe>
            <div id="ghost-overlay"></div>
        </div>

        <div id="resizer"></div>

        <div id="task-only-footer">
            <button class="btn-tool" onclick="setViewMode('notes')" style="background:#333; color:white; font-weight:bold;">Focus Notes</button>
        </div>

        <div class="editor-area">
            <div id="width-wrapper" class="content-width-wrapper">
                <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                <div class="editor-content-wrapper">
                    <div id="editor-container"></div>
                </div>
                <div class="bottom-bar">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span id="status" style="font-size:0.8em; font-weight:600;">Saved</span>
                        <button class="btn-tool" onclick="toggleTickTick()" id="ticktick-toggle">📅 Tasks</button>
                        <button class="btn-tool" onclick="setViewMode('tasks')" id="focus-tasks-btn">🔍 Focus Tasks</button>
                    </div>
                    <div style="display:flex; gap:12px; align-items:center;">
                        <div class="radio-group">
                            <label><input type="radio" name="view-width" value="full" onclick="setWidth('full')" checked> Full</label>
                            <label><input type="radio" name="view-width" value="narrow" onclick="setWidth('narrow')"> Narrow</label>
                        </div>
                        <button class="btn-tool" onclick="copyNote()">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="backup-modal" class="modal-overlay">
        <div class="modal-content" style="background:var(--editor-bg); padding:25px; border-radius:8px; border:1px solid var(--border-color); text-align:center;">
            <h3>Daily Backup</h3>
            <p>Don't forget to save your daily database backup to OneDrive.</p>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                <button onclick="dismissBackupPrompt()">Later</button>
                <button class="native-new-btn" onclick="executePromptedBackup()">Backup Now</button>
            </div>
        </div>
    </div>

<script src="quill.js"></script>
<script>
    const APP_VERSION = 1.1;
    let currentNoteId = null;
    let saveTimeout = null;

    const highlightHandler = function() {
        const range = quill.getSelection();
        if (!range) return;
        const format = quill.getFormat(range);
        quill.format('background', format.background ? false : '#ffff00');
    };

    function insertCurrentDate() {
        const range = quill.getSelection();
        if (!range) return;
        const today = new Date();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const dateText = `${mm}-${dd} - `;
        quill.insertText(range.index, dateText, Quill.sources.USER);
        quill.setSelection(range.index + dateText.length, 0);
    }

    var quill = new Quill('#editor-container', {
        modules: { 
            toolbar: {
                container: [[{ 'size': ['small', false, 'large', 'huge'] }], ['link'], ['highlight'], ['clean']],
                handlers: { 'highlight': highlightHandler }
            },
            keyboard: {
                bindings: {
                    insertDate: {
                        key: 'D', shiftKey: true, shortKey: true,
                        handler: function(range) { insertCurrentDate(); return false; }
                    }
                }
            }
        },
        theme: 'snow'
    });

    const toolbarEl = document.querySelector('.ql-toolbar');
    const customWrapper = document.createElement('div');
    customWrapper.className = 'custom-toolbar-wrapper';
    toolbarEl.parentNode.insertBefore(customWrapper, toolbarEl);
    customWrapper.appendChild(document.querySelector('.toggle-sidebar'));
    customWrapper.appendChild(toolbarEl);

    const nativeBtn = document.createElement('button');
    nativeBtn.className = 'native-new-btn';
    nativeBtn.innerHTML = '<span class="plus-sign">+</span><span class="btn-text">&nbsp;NEW NOTE</span>';
    nativeBtn.onclick = createNewNote;
    customWrapper.appendChild(nativeBtn);

    const resizer = document.getElementById('resizer');
    const todoContainer = document.getElementById('todo-container');
    const editorArea = document.querySelector('.editor-area');
    const ghost = document.getElementById('ghost-overlay');
    const taskOnlyFooter = document.getElementById('task-only-footer');

    resizer.addEventListener('mousedown', (e) => {
        ghost.style.display = 'block';
        const move = (e) => {
            let h = (e.clientY / window.innerHeight) * 100;
            if (h > 10 && h < 85) {
                todoContainer.style.height = h + '%';
                localStorage.setItem('ticktick-height', h);
            }
        };
        const stop = () => {
            ghost.style.display = 'none';
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', stop);
        };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', stop);
    });

    function setViewMode(mode) {
        if (mode === 'tasks') {
            todoContainer.classList.add('visible', 'fullscreen');
            resizer.classList.remove('visible');
            editorArea.classList.add('hidden');
            taskOnlyFooter.classList.add('visible');
            localStorage.setItem('view-focus-pref', 'tasks');
        } else {
            todoContainer.classList.remove('fullscreen');
            editorArea.classList.remove('hidden');
            taskOnlyFooter.classList.remove('visible');
            const wasVisible = localStorage.getItem('ticktick-pref') === 'true';
            todoContainer.classList.toggle('visible', wasVisible);
            resizer.classList.toggle('visible', wasVisible);
            localStorage.setItem('view-focus-pref', 'notes');
        }
    }

    function toggleTickTick() {
        const isVisible = todoContainer.classList.toggle('visible');
        resizer.classList.toggle('visible', isVisible);
        localStorage.setItem('ticktick-pref', isVisible);
    }

    function createNewNote() {
        currentNoteId = Date.now();
        quill.setText(`\n`, 'user');
        quill.focus();
    }

    function checkBackupPrompt() {
        if (sessionStorage.getItem('backup-prompt-dismissed')) return;
        const lastBackup = localStorage.getItem('last-backup-date');
        const now = new Date().getTime();
        if (!lastBackup || (now - new Date(lastBackup).getTime() > 86400000)) {
            document.getElementById('backup-modal').classList.add('active');
        }
    }

    function exportNotes() {
        const raw = localStorage.getItem('my-github-notes');
        const blob = new Blob([raw], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        localStorage.setItem('last-backup-date', new Date().toISOString());
    }

    function executePromptedBackup() { exportNotes(); dismissBackupPrompt(); }
    function dismissBackupPrompt() { sessionStorage.setItem('backup-prompt-dismissed', 'true'); document.getElementById('backup-modal').classList.remove('active'); }

    function getNotesSafely() {
        try {
            const raw = localStorage.getItem('my-github-notes');
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : (parsed.data || []);
        } catch (e) { return []; }
    }

    function saveNotesInternal(notes) {
        localStorage.setItem('my-github-notes', JSON.stringify({ version: APP_VERSION, data: notes }));
        renderNoteList();
    }

    quill.on('text-change', (delta, old, source) => {
        if (source === 'user') {
            const selection = quill.getSelection();
            if (selection && selection.index >= 2) {
                const text = quill.getText(selection.index - 2, 2);
                if (text === '//') {
                    const format = quill.getFormat(selection.index - 2, 2);
                    const toggleYellow = !format.background;
                    quill.deleteText(selection.index - 2, 2, Quill.sources.USER);
                    setTimeout(() => { quill.format('background', toggleYellow ? '#ffff00' : false, Quill.sources.USER); }, 10);
                }
            }
            document.getElementById('status').innerText = "Saving...";
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(autoSave, 1000);
        }
    });

    function autoSave() {
        let fullText = quill.getText().trim();
        let firstLine = fullText.split('\n')[0].trim() || 'Untitled Note';
        let notes = getNotesSafely();
        
        const noteData = { 
            id: currentNoteId || Date.now(), 
            title: firstLine, 
            content: quill.getContents(), 
            plainText: quill.getText(),
            date: new Date().toISOString() 
        };
        
        const idx = notes.findIndex(n => n.id === currentNoteId);
        if (idx > -1) notes[idx] = noteData; else { notes.push(noteData); currentNoteId = noteData.id; }
        saveNotesInternal(notes);
        localStorage.setItem('last-note-id', currentNoteId);
        document.getElementById('status').innerText = "Saved";
    }

    function renderNoteList() {
        const list = document.getElementById('note-list');
        list.innerHTML = '';
        const notes = getNotesSafely();
        const searchTerm = document.getElementById('sidebar-search').value.toLowerCase();
        
        notes.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(note => {
            const titleMatch = (note.title || "").toLowerCase().includes(searchTerm);
            const contentMatch = (note.plainText || "").toLowerCase().includes(searchTerm);
            
            if (searchTerm && !titleMatch && !contentMatch) return;
            
            const div = document.createElement('div');
            div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
            
            const titleCont = document.createElement('div');
            titleCont.style = "flex-grow:1; overflow:hidden; display:flex; flex-direction:column; gap:2px;";
            titleCont.onclick = () => loadNote(note.id);
            
            const titleEl = document.createElement('div');
            titleEl.style = "font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;";
            titleEl.textContent = note.title || "Untitled";

            const dateEl = document.createElement('div');
            dateEl.style = "font-size:0.75em; color:var(--secondary-text);";
            dateEl.textContent = new Date(note.date).toLocaleDateString();

            titleCont.appendChild(titleEl);
            titleCont.appendChild(dateEl);
            
            const delBtn = document.createElement('span');
            delBtn.className = 'delete-btn';
            delBtn.innerHTML = '&times;';
            delBtn.onclick = (e) => { e.stopPropagation(); deleteNote(note.id); };

            div.appendChild(titleCont);
            div.appendChild(delBtn);
            list.appendChild(div);
        });
    }

    function deleteNote(id) {
        if (confirm("Delete this note?")) {
            let notes = getNotesSafely().filter(n => n.id !== id);
            saveNotesInternal(notes);
            if (currentNoteId === id) { if (notes.length > 0) loadNote(notes[0].id); else createNewNote(); } else { renderNoteList(); }
        }
    }

    function loadNote(id) {
        const note = getNotesSafely().find(n => n.id === id);
        if (note) { currentNoteId = note.id; quill.setContents(note.content); renderNoteList(); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function setWidth(mode) { document.getElementById('width-wrapper').className = `content-width-wrapper ${mode}`; localStorage.setItem('width-pref', mode); }
    function copyNote() { navigator.clipboard.writeText(quill.getText()).then(() => { const status = document.getElementById('status'); const original = status.innerText; status.innerText = "Copied!"; setTimeout(() => status.innerText = original, 1500); }); }

    function importNotes(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                const newData = Array.isArray(imported) ? imported : (imported.data || []);
                if (confirm("Merge imported notes?")) {
                    const existing = getNotesSafely();
                    const existingIds = new Set(existing.map(n => n.id));
                    const merged = [...existing, ...newData.filter(n => !existingIds.has(n.id))];
                    saveNotesInternal(merged);
                }
            } catch (err) { alert("Invalid file."); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    window.onload = () => {
        renderNoteList();
        const savedHeight = localStorage.getItem('ticktick-height');
        if (savedHeight) todoContainer.style.height = savedHeight + '%';
        const focusPref = localStorage.getItem('view-focus-pref');
        if (focusPref === 'tasks') setViewMode('tasks');
        else if (localStorage.getItem('ticktick-pref') === 'true') toggleTickTick();
        const wp = localStorage.getItem('width-pref') || 'full';
        setWidth(wp);
        document.querySelector(`input[value="${wp}"]`).checked = true;
        const lastId = localStorage.getItem('last-note-id');
        if (lastId) loadNote(parseInt(lastId)); else createNewNote();
        setTimeout(checkBackupPrompt, 1500);
    };
</script>
</body>
</html>
