<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100%;
            display: flex; flex-direction: column; overflow: hidden; background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Top Container: TickTick */
        #todo-container {
            height: 50%; /* Initial split at 50% */
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        #todo-frame {
            position: absolute;
            top: 0; left: 0;
            /* Scaling math: 1 / 0.8 = 1.25 (125%) to fill the area at 80% zoom */
            width: 125%; height: 125%;
            transform: scale(0.8);
            transform-origin: top left;
            border: none;
        }

        /* Ghost overlay blocks the iframe during dragging so it doesn't steal mouse events */
        #ghost-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9;
        }

        /* The Draggable Divider */
        #resizer {
            height: 10px;
            background: #333;
            cursor: row-resize;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        #resizer::after {
            content: "═══";
            color: #aaa;
            font-size: 10px;
            font-weight: bold;
        }
        #resizer:hover { background: #444; }

        /* Bottom Container: Quill Editor */
        #editor-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: white;
        }

        #editor { 
            flex: 1; 
            overflow-y: auto; 
            border: none !important;
        }

        .ql-toolbar {
            border-left: none !important;
            border-right: none !important;
            border-top: none !important;
            background: #f8f8f8;
        }

        .toolbar-footer {
            display: flex; 
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px; 
            background: #eee;
            font-size: 10px; 
            border-top: 1px solid #ccc;
            color: #555;
        }

        button {
            font-size: 10px;
            cursor: pointer;
            padding: 2px 6px;
        }
    </style>
</head>
<body>

    <div id="todo-container">
        <iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe>
        <div id="ghost-overlay"></div>
    </div>

    <div id="resizer" title="Drag to resize"></div>

    <div id="editor-container">
        <div id="editor"></div>
        <div class="toolbar-footer">
            <span id="save-status">Ready</span>
            <button onclick="exportNotes()">Export HTML</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script>
        // 1. Initialize Quill Editor
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: { 
                toolbar: [
                    ['bold', 'italic'], 
                    [{ 'list': 'bullet' }, { 'list': 'ordered' }], 
                    ['clean']
                ] 
            },
            placeholder: 'Type your daily notes here (saved locally)...'
        });

        // LOAD: Retrieve from LocalStorage
        const savedData = localStorage.getItem('quill_sidebar_content');
        if (savedData) {
            quill.root.innerHTML = savedData;
        }

        // SAVE: On every keystroke
        quill.on('text-change', () => {
            localStorage.setItem('quill_sidebar_content', quill.root.innerHTML);
            document.getElementById('save-status').innerText = "Saved: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        });

        // 2. Drag-to-Resize Logic
        const resizer = document.getElementById('resizer');
        const todoContainer = document.getElementById('todo-container');
        const ghost = document.getElementById('ghost-overlay');

        resizer.addEventListener('mousedown', (e) => {
            e.preventDefault();
            ghost.style.display = 'block'; // Block the iframe so dragging is smooth
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', () => {
                ghost.style.display = 'none';
                document.removeEventListener('mousemove', handleMouseMove);
            });
        });

        function handleMouseMove(e) {
            // Calculate height as percentage of window
            const newHeight = (e.clientY / window.innerHeight) * 100;
            // Prevent frames from disappearing (min 10%, max 90%)
            if (newHeight > 10 && newHeight < 90) {
                todoContainer.style.height = newHeight + '%';
            }
        }

        // 3. Export Logic (keeps infosec data portable)
        function exportNotes() {
            const content = quill.root.innerHTML;
            const fullHtml = `<html><head><meta charset="UTF-8"></head><body>${content}</body></html>`;
            const blob = new Blob([fullHtml], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `sidebar_notes_${new Date().toISOString().slice(0,10)}.html`;
            a.click();
        }
    </script>
</body>
</html>
