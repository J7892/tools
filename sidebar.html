<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100%;
            display: flex; flex-direction: column; overflow: hidden; background: #fff;
            font-family: -apple-system, sans-serif;
        }

        /* TickTick Section - Set to 1/3 height (approx 33.3%) */
        #todo-container { height: 33.3%; width: 100%; overflow: hidden; position: relative; }
        #todo-frame { 
            position: absolute; top: 0; left: 0; width: 125%; height: 125%; 
            transform: scale(0.8); transform-origin: top left; border: none; 
        }

        /* Ghost overlay for smooth dragging */
        #ghost-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 9; }

        /* The Resizer / Divider */
        #resizer { 
            height: 8px; 
            background: #f8f9fa; 
            border-top: 1px solid #e5e5e5; 
            border-bottom: 1px solid #e5e5e5; 
            cursor: row-resize; 
            width: 100%; 
            z-index: 10; 
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s ease;
        }
        #resizer:hover { background: #e9ecef; }
        #resizer::after {
            content: "";
            width: 32px;
            height: 3px;
            background: #ced4da;
            border-radius: 3px;
        }

        /* Notes Section (Takes up the remaining 2/3) */
        #editor-wrapper { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        #note-list { 
            width: 0; transition: 0.3s; background: #f4f4f4; 
            border-right: 1px solid #ccc; overflow-y: auto; font-size: 11px;
        }
        #note-list.open { width: 150px; }
        
        .note-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; 
        }
        .note-item:hover { background: #e0e0e0; }
        .note-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        
        .delete-btn { 
            color: #cc0000; font-weight: bold; padding: 0 5px; 
            visibility: hidden; cursor: pointer; font-size: 14px;
        }
        .note-item:hover .delete-btn { visibility: visible; }

        /* Editor Area */
        #editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #editor { flex: 1; overflow-y: auto; border: none !important; }

        .toolbar-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 4px 8px; background: #eee; font-size: 10px; border-top: 1px solid #ccc; 
        }
        button { cursor: pointer; font-size: 10px; padding: 2px 5px; }
    </style>
</head>
<body>

    <div id="todo-container">
        <iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe>
        <div id="ghost-overlay"></div>
    </div>

    <div id="resizer"></div>

    <div id="editor-wrapper">
        <div id="note-list">
            <div style="padding: 10px; font-weight: bold; border-bottom: 1px solid #ccc;">My Notes</div>
            <div id="list-items"></div>
        </div>

        <div id="editor-container">
            <div id="editor"></div>
            <div class="toolbar-footer">
                <div>
                    <button onclick="toggleList()">☰ Notes</button>
                    <button onclick="createNewNote()">+ New</button>
                </div>
                <span id="save-status">Ready</span>
                <button onclick="exportNotes()">Export</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        let currentNoteId = localStorage.getItem('current_note_id') || 'default';
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] }
        });

        function loadNote(id) {
            currentNoteId = id;
            localStorage.setItem('current_note_id', id);
            quill.root.innerHTML = localStorage.getItem('note_' + id) || '';
            updateListUI();
        }

        quill.on('text-change', () => {
            // Save the rich HTML content for the editor
            localStorage.setItem('note_' + currentNoteId, quill.root.innerHTML);
            
            // Extract the title for the list (first line only)
            let fullText = quill.getText().trim();
            let firstLine = fullText.split('\n')[0].trim() || 'Untitled';
            
            if (firstLine.length > 25) {
                firstLine = firstLine.substring(0, 25) + '...';
            }
            
            localStorage.setItem('title_' + currentNoteId, firstLine);
            document.getElementById('save-status').innerText = "Saved";
            updateListUI();
        });

        function createNewNote() {
            const id = 'note_' + Date.now();
            loadNote(id);

            // Get today's date and format it as mm-dd
            const today = new Date();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const dateString = `${mm}-${dd}\n\n`; // Adds line breaks after the date

            // Set the text in the editor
            quill.setText(dateString);

            // Move the typing cursor to the very end so you can start typing
            quill.setSelection(quill.getLength(), 0);
        }

        function deleteNote(id, event) {
            event.stopPropagation();
            if (confirm("Delete this note?")) {
                localStorage.removeItem('note_' + id);
                localStorage.removeItem('title_' + id);
                if (currentNoteId === id) loadNote('default');
                else updateListUI();
            }
        }

        function toggleList() {
            document.getElementById('note-list').classList.toggle('open');
        }

        function updateListUI() {
            const listContainer = document.getElementById('list-items');
            listContainer.innerHTML = '';
            const keys = Object.keys(localStorage).filter(k => k.startsWith('note_'));
            keys.forEach(key => {
                const id = key.replace('note_', '');
                const title = localStorage.getItem('title_' + id) || 'Untitled';
                const item = document.createElement('div');
                item.className = 'note-item';
                if (id === currentNoteId) item.style.background = "#e8f0fe";
                const titleSpan = document.createElement('span');
                titleSpan.className = 'note-title';
                titleSpan.innerText = title;
                titleSpan.onclick = () => loadNote(id);
                const delBtn = document.createElement('span');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = (e) => deleteNote(id, e);
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                listContainer.appendChild(item);
            });
        }

        // Cross-Window Sync Logic
        window.addEventListener('storage', (event) => {
            // Update the sidebar list if note titles changed
            if (event.key && (event.key.startsWith('note_') || event.key.startsWith('title_'))) {
                updateListUI();
            }
            // Update the editor if the CURRENT note was modified elsewhere
            if (event.key === 'note_' + currentNoteId) {
                if (quill.root.innerHTML !== event.newValue) {
                    quill.root.innerHTML = event.newValue || '';
                    document.getElementById('save-status').innerText = "Synced";
                }
            }
        });

        // Resizer Logic
        const resizer = document.getElementById('resizer');
        const todoContainer = document.getElementById('todo-container');
        const ghost = document.getElementById('ghost-overlay');

        resizer.addEventListener('mousedown', (e) => {
            ghost.style.display = 'block';
            const move = (e) => {
                let h = (e.clientY / window.innerHeight) * 100;
                if (h > 5 && h < 95) todoContainer.style.height = h + '%';
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => {
                ghost.style.display = 'none';
                document.removeEventListener('mousemove', move);
            });
        });

        function exportNotes() {
            const blob = new Blob([quill.root.innerHTML], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `note_${currentNoteId}.html`;
            a.click();
        }

        loadNote(currentNoteId);
    </script>
</body>
</html>
