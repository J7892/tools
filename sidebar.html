<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes and Tasks</title>
    
    <meta name="theme-color" content="#333333">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --sidebar-bg: white;
            --editor-bg: white;
            --text-color: #333;
            --secondary-text: #888;
            --border-color: #ddd;
            --item-hover: #f0f0f0;
            --toolbar-bg: #fff;
            --danger: #d9534f;
            --highlight: #ffff00;
            --editor-font-size: 14px;
        }

        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        
        .sidebar { width: 280px; min-width: 280px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: margin-left 0.3s ease; margin-left: -280px; height: 100vh; z-index: 3000; }
        .sidebar.open { margin-left: 0; }
        
        .sidebar-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        #sidebar-search { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 0.85em; }
        .sort-container { display: flex; align-items: center; justify-content: space-between; font-size: 0.75em; color: var(--secondary-text); padding: 0 2px; }
        #sort-select { border: none; background: transparent; color: var(--text-color); font-weight: 600; cursor: pointer; outline: none; }

        .main-layout { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
        #todo-container { height: 40%; width: 100%; overflow: hidden; position: relative; flex-shrink: 0; display: none; }
        #todo-container.visible { display: block; border-bottom: 1px solid var(--border-color); }
        #todo-container.fullscreen { flex: 1; height: auto !important; width: 100% !important; border-bottom: none; }
        #todo-frame { position: absolute; top: 0; left: 0; width: 125%; height: 125%; transform: scale(0.8); transform-origin: top left; border: none; pointer-events: auto; }
        #ghost-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 99999; background: transparent; }

        #resizer { height: 16px; background: #eee; cursor: row-resize; width: 100%; z-index: 5000; flex-shrink: 0; display: none; justify-content: center; align-items: center; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); user-select: none; touch-action: none; }
        #resizer.visible { display: flex; }
        #resizer::after { content: ""; width: 40px; height: 4px; background: #bbb; border-radius: 4px; }

        @media (min-width: 1000px) {
            .main-layout:not(.focus-tasks-active) { flex-direction: row-reverse; }
            #todo-container:not(.fullscreen) { height: 100% !important; width: 400px; border-bottom: none; border-left: 1px solid var(--border-color); }
            #resizer:not(.hidden-by-focus) { width: 16px; height: 100%; cursor: col-resize; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-top: none; border-bottom: none; }
            #resizer::after { width: 4px; height: 40px; }
        }

        .editor-area { flex: 1; background: var(--editor-bg); display: flex; flex-direction: column; padding: 10px 40px; position: relative; min-width: 0; align-items: center; overflow: hidden; }
        .content-width-wrapper { width: 100%; max-width: 100%; display: flex; flex-direction: column; height: 100%; min-height: 0; transition: max-width 0.3s ease; }
        .content-width-wrapper.narrow { max-width: 800px; }
        .editor-content-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; margin-top: 10px; position: relative; }
        
        /* Fixed Toolbar Styling */
        .custom-toolbar-wrapper { display: flex; align-items: center; background: var(--toolbar-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 5px; width: 100%; min-height: 48px; gap: 5px; }
        .ql-toolbar.ql-snow { border: none !important; padding: 0 !important; display: flex; align-items: center; }
        
        .ql-highlight { position: relative !important; width: 28px !important; height: 24px !important; display: inline-block; cursor: pointer; }
        .ql-highlight::after { content: "H"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--highlight); padding: 0 5px; border-radius: 2px; border: 1px solid #ccc; font-weight: bold; font-size: 12px; color: #333; }

        .native-new-btn { background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 0 16px; font-weight: 600; font-size: 12px; cursor: pointer; height: 32px; white-space: nowrap; }
        .toggle-sidebar { background: #333; color: white; padding: 0 12px; cursor: pointer; border-radius: 4px; border: none; font-size: 1.1em; height: 32px; }

        .ql-container.ql-snow { flex: 1; border: 1px solid var(--border-color) !important; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; margin-top: 5px; }
        .ql-editor { flex: 1; overflow-y: auto; padding: 20px; line-height: 1.4; font-size: var(--editor-font-size) !important; }
        
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border-color); width: 100%; background: var(--editor-bg); }
        .btn-tool { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { padding: 6px 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; border-radius: 4px; }
        .note-item:hover { background: var(--item-hover); }
        .note-item.active { background: var(--item-hover); border-left: 4px solid #007bff; }
        .note-title { font-size: 0.85em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        .item-actions { display: flex; align-items: center; gap: 4px; visibility: hidden; }
        .note-item:hover .item-actions { visibility: visible; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-controls">
            <button class="native-new-btn" style="width:100%;" onclick="createNewNote()">+ New Note</button>
            <input type="text" id="sidebar-search" placeholder="Search..." oninput="renderNoteList()">
            <select id="sort-select" onchange="changeSort(this.value)">
                <option value="date">Date Created</option>
                <option value="lastModified">Last Modified</option>
            </select>
        </div>
        <div id="note-list" class="note-list"></div>
    </div>

    <div class="main-layout" id="main-layout">
        <div id="editor-area" class="editor-area">
            <div id="width-wrapper" class="content-width-wrapper narrow">
                <div class="editor-content-wrapper">
                    <div class="custom-toolbar-wrapper">
                        <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                        <div id="toolbar-container"></div>
                        <button class="native-new-btn" onclick="createNewNote()">+ NEW</button>
                    </div>
                    <div id="editor-container"></div>
                </div>
                <div class="bottom-bar">
                    <span id="status">Saved</span>
                    <div class="radio-group">
                        <label><input type="radio" name="view-width" value="full" onclick="setWidth('full')"> Full</label>
                        <label><input type="radio" name="view-width" value="narrow" onclick="setWidth('narrow')" checked> Narrow</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    let currentNoteId = null;
    let sortMode = localStorage.getItem('sort-pref') || 'date';
    
    const highlightHandler = () => quill.format('background', quill.getFormat().background ? false : '#ffff00');
    
    var quill = new Quill('#editor-container', {
        modules: { toolbar: { container: [[{ 'size': ['small', false, 'large', 'huge'] }], ['link'], ['highlight'], ['clean']], handlers: { 'highlight': highlightHandler } } },
        theme: 'snow'
    });
    document.getElementById('toolbar-container').appendChild(document.querySelector('.ql-toolbar'));

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function setWidth(m) { document.getElementById('width-wrapper').className = `content-width-wrapper ${m}`; localStorage.setItem('width-pref', m); }
    function getNotes() { try { return JSON.parse(localStorage.getItem('my-github-notes')).data || []; } catch(e) { return []; } }
    function saveNotes(notes) { localStorage.setItem('my-github-notes', JSON.stringify({ data: notes })); renderNoteList(); }

    function autoSave() {
        let notes = getNotes();
        let idx = notes.findIndex(n => n.id == currentNoteId);
        let noteData = { id: currentNoteId || Date.now(), title: quill.getText().split('\n')[0].trim() || 'Untitled', content: quill.getContents(), plainText: quill.getText(), lastModified: new Date().toISOString() };
        if(idx > -1) notes[idx] = { ...notes[idx], ...noteData }; else { notes.push(noteData); currentNoteId = noteData.id; }
        saveNotes(notes);
        document.getElementById('status').innerText = "Saved";
    }

    function renderNoteList() {
        const list = document.getElementById('note-list');
        list.innerHTML = '';
        getNotes().sort((a,b) => new Date(b[sortMode]||b.date) - new Date(a[sortMode]||a.date)).forEach(note => {
            let div = document.createElement('div');
            div.className = `note-item ${note.id == currentNoteId ? 'active' : ''}`;
            div.innerHTML = `<div style="flex-grow:1; overflow:hidden;" onclick="loadNote(${note.id})"><div class="note-title">${note.title}</div></div>
                             <div class="item-actions"><span class="delete-btn" onclick="deleteNote(${note.id})">&times;</span></div>`;
            list.appendChild(div);
        });
    }

    function loadNote(id) { currentNoteId = id; quill.setContents(getNotes().find(n => n.id == id).content); renderNoteList(); }
    function deleteNote(id) { if(confirm("Delete?")) { saveNotes(getNotes().filter(n => n.id != id)); if(currentNoteId == id) createNewNote(); } }
    function createNewNote() { currentNoteId = Date.now(); quill.setText('\n'); quill.focus(); }
    function changeSort(v) { sortMode = v; localStorage.setItem('sort-pref', v); renderNoteList(); }

    document.addEventListener('DOMContentLoaded', () => { 
        renderNoteList(); 
        let wp = localStorage.getItem('width-pref') || 'narrow';
        setWidth(wp);
        document.querySelector(`input[value="${wp}"]`).checked = true;
        if(getNotes().length > 0) loadNote(getNotes()[0].id); else createNewNote(); 
        quill.on('text-change', () => { document.getElementById('status').innerText = "Saving..."; clearTimeout(saveTimeout); saveTimeout = setTimeout(autoSave, 1000); });
    });
</script>
</body>
</html>
