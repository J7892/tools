<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Notes</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; height: 100vh; width: 100%; display: flex; flex-direction: column; overflow: hidden; background: #fff; font-family: -apple-system, sans-serif; }
        #todo-container { height: 33.3%; width: 100%; overflow: hidden; position: relative; flex-shrink: 0; }
        #todo-frame { position: absolute; top: 0; left: 0; width: 125%; height: 125%; transform: scale(0.8); transform-origin: top left; border: none; }
        #resizer { height: 8px; background: #f8f9fa; border-top: 1px solid #e5e5e5; border-bottom: 1px solid #e5e5e5; cursor: row-resize; width: 100%; z-index: 10; display: flex; justify-content: center; align-items: center; }
        #editor-wrapper { flex: 1; display: flex; overflow: hidden; min-height: 0; }
        #note-list { width: 0; transition: 0.3s; background: #f4f4f4; border-right: 1px solid #ccc; overflow-y: auto; font-size: 12px; display: flex; flex-direction: column; }
        #note-list.open { width: 180px; }
        #sidebar-search { margin: 8px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 11px; outline: none; }
        .custom-toolbar-wrapper { display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #ccc; padding: 4px 8px; box-sizing: border-box; }
        .native-new-btn { background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 0 12px; font-weight: 600; font-size: 12px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .ql-editor > *:first-child { font-size: 1.4em !important; font-weight: bold !important; margin-bottom: 0.5em !important; }
        .toolbar-footer { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; background: #f8f9fa; font-size: 11px; border-top: 1px solid #ccc; flex-wrap: wrap; gap: 4px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; padding: 20px; border-radius: 8px; text-align: center; max-width: 300px; width: 85%; border: 1px solid #ccc; }
        @media (max-width: 500px) { .native-new-btn .btn-text { display: none; } .native-new-btn { padding: 0; width: 32px; font-size: 16px; } }
    </style>
</head>
<body>
    <div id="todo-container"><iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe></div>
    <div id="resizer"></div>
    <div id="editor-wrapper">
        <div id="note-list">
            <div style="padding: 10px; font-weight: bold;">My Notes</div>
            <input type="text" id="sidebar-search" placeholder="Search..." oninput="updateListUI()">
            <div id="list-items" style="flex-grow:1; overflow-y:auto;"></div>
        </div>
        <div id="editor-container" style="flex:1; display:flex; flex-direction:column;">
            <div id="editor" style="flex:1; overflow-y:auto;"></div>
            <div class="toolbar-footer">
                <span id="save-status" style="font-weight:600;">Ready</span>
                <div style="display:flex; gap:4px;">
                    <button onclick="copyNote(event)">Copy</button>
                    <button onclick="exportNotes()">Backup</button>
                    <button onclick="document.getElementById('import-input').click()">Import</button>
                    <input type="file" id="import-input" style="display:none" onchange="importNotes(event)">
                </div>
            </div>
        </div>
    </div>

    <div id="backup-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Daily Backup</h3>
            <p>It's time for your daily backup. Save a copy of your notes to stay safe!</p>
            <div style="display:flex; gap:8px; justify-content:center; margin-top:15px;">
                <button onclick="dismissBackupPrompt()">Later</button>
                <button class="native-new-btn" style="height:auto; padding:6px 12px;" onclick="executePromptedBackup()">Backup Now</button>
            </div>
        </div>
    </div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    const APP_VERSION = 1.1; 
    let currentNoteId = null;
    const quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] } });

    // Dynamic Header Creation
    const toolbarEl = document.querySelector('.ql-toolbar');
    const customWrapper = document.createElement('div');
    customWrapper.className = 'custom-toolbar-wrapper';
    toolbarEl.parentNode.insertBefore(customWrapper, toolbarEl);
    const toggleBtn = document.createElement('button');
    toggleBtn.innerHTML = '☰';
    toggleBtn.onclick = () => document.getElementById('note-list').classList.toggle('open');
    customWrapper.appendChild(toggleBtn);
    customWrapper.appendChild(toolbarEl);
    const nativeBtn = document.createElement('button');
    nativeBtn.className = 'native-new-btn';
    nativeBtn.innerHTML = '<span class="plus-sign">+</span><span class="btn-text">&nbsp;NEW NOTE</span>';
    nativeBtn.onclick = createNewNote;
    customWrapper.appendChild(nativeBtn);

    function createNewNote() {
        currentNoteId = Date.now();
        const today = new Date();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const dateText = `${mm}-${dd} - `;
        quill.setText(`${dateText}\n\n`, 'user'); 
        quill.setSelection(dateText.length, 0);
        quill.focus();
    }

    function checkBackupPrompt() {
        if (sessionStorage.getItem('backup-prompt-dismissed')) return;
        const lastBackup = localStorage.getItem('last-backup-date');
        const now = new Date().getTime();
        const oneDay = 24 * 60 * 60 * 1000;
        if (!lastBackup || (now - new Date(lastBackup).getTime() > oneDay)) {
            document.getElementById('backup-modal').classList.add('active');
        }
    }

    function exportNotes() {
        const raw = localStorage.getItem('my-github-notes');
        const blob = new Blob([raw], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        localStorage.setItem('last-backup-date', new Date().toISOString());
    }

    function executePromptedBackup() { exportNotes(); dismissBackupPrompt(); }
    function dismissBackupPrompt() { sessionStorage.setItem('backup-prompt-dismissed', 'true'); document.getElementById('backup-modal').classList.remove('active'); }

    // [Initialization and listener logic matches the Standalone app...]
    window.onload = () => { setTimeout(checkBackupPrompt, 1500); };
</script>
</body>
</html>
