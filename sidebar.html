<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes and Tasks</title>
    
    <meta name="theme-color" content="#333333">
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
    
    <link href="/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --sidebar-bg: white;
            --editor-bg: white;
            --text-color: #333;
            --secondary-text: #888;
            --border-color: #ddd;
            --item-hover: #f0f0f0;
            --toolbar-bg: #fff;
            --danger: #d9534f;
            --highlight: #ffff00;
            /* Default Text Size shifted to 14px */
            --editor-font-size: 14px;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg-color); color: var(--text-color);
            height: 100vh; width: 100vw; overflow: hidden; display: flex; 
        }
        
        .sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease; 
            margin-left: -280px; height: 100vh; z-index: 3000;
        }
        .sidebar.open { margin-left: 0; }
        #sidebar-search { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 0.85em; }

        .main-layout { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }

        /* TickTick Frame Styling */
        #todo-container { height: 40%; width: 100%; overflow: hidden; position: relative; flex-shrink: 0; display: none; }
        #todo-container.visible { display: block; border-bottom: 1px solid var(--border-color); }
        #todo-container.fullscreen { flex: 1; height: auto !important; width: 100% !important; border-bottom: none; }
        #todo-frame { position: absolute; top: 0; left: 0; width: 125%; height: 125%; transform: scale(0.8); transform-origin: top left; border: none; pointer-events: auto; }
        
        /* The Shield */
        #ghost-overlay { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: 99999; background: transparent;
        }

        /* Resizer Bar - Vertical by default */
        #resizer { 
            height: 16px; background: #eee; cursor: row-resize; width: 100%; 
            z-index: 5000; flex-shrink: 0; display: none; justify-content: center; align-items: center;
            border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
            user-select: none;
            touch-action: none; 
        }
        #resizer.visible { display: flex; }
        #resizer::after { content: ""; width: 40px; height: 4px; background: #bbb; border-radius: 4px; }

        @media (min-width: 1000px) {
            .main-layout:not(.focus-tasks-active) { flex-direction: row-reverse; }
            #todo-container:not(.fullscreen) { height: 100% !important; width: 400px; border-bottom: none; border-left: 1px solid var(--border-color); }
            #resizer:not(.hidden-by-focus) { width: 16px; height: 100%; cursor: col-resize; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-top: none; border-bottom: none; }
            #resizer::after { width: 4px; height: 40px; }
        }

        /* Editor Area */
        .editor-area { flex: 1; background: var(--editor-bg); display: flex; flex-direction: column; padding: 10px 40px; position: relative; min-width: 0; align-items: center; overflow: hidden; }
        .editor-area.hidden { display: none; }
        .content-width-wrapper { width: 100%; max-width: 100%; display: flex; flex-direction: column; height: 100%; min-height: 0; transition: max-width 0.3s ease; }
        .content-width-wrapper.narrow { max-width: 800px; }
        .editor-content-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; margin-top: 10px; position: relative; }
        
        .custom-toolbar-wrapper { 
            display: flex; align-items: center; background: var(--toolbar-bg); 
            border: 1px solid var(--border-color); border-bottom: none; 
            border-top-left-radius: 4px; border-top-right-radius: 4px; 
            padding: 0 10px; width: 100%; min-height: 48px; gap: 5px;
        }

        #toolbar-container { flex-grow: 1; display: flex; align-items: center; }
        .ql-toolbar.ql-snow { border: none !important; padding: 0 !important; display: flex; align-items: center; }
        
        .ql-highlight { position: relative !important; width: 28px !important; height: 24px !important; display: inline-block; }
        .ql-highlight::after { 
            content: "H"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--highlight); padding: 0 5px; border-radius: 2px; border: 1px solid #ccc; 
            font-weight: bold; font-size: 12px; color: #333; pointer-events: none;
        }

        .native-new-btn { background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 0 16px; font-weight: 600; font-size: 12px; cursor: pointer; height: 32px; white-space: nowrap; flex-shrink: 0; margin-left: auto; }
        .toggle-sidebar { background: #333; color: white; padding: 0 12px; cursor: pointer; border-radius: 4px; border: none; font-size: 1.1em; height: 32px; display: flex; align-items: center; justify-content: center; }

        .ql-container.ql-snow { flex: 1; border: 1px solid var(--border-color) !important; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Font size dynamically linked to CSS variable */
        .ql-editor { flex: 1; overflow-y: auto; padding: 20px; line-height: 1.4; font-size: var(--editor-font-size) !important; }
        .ql-editor p { margin-bottom: 0.8em !important; }
        .ql-editor p:last-child { margin-bottom: 0 !important; }
        
        /* Title permanently locked to 26px so it stays looking like a header */
        .ql-editor > *:first-child { font-size: 26px !important; font-weight: bold !important; margin-bottom: 0.8em !important; }
        
        /* Nullify any existing inline Quill sizes so the global setting takes absolute priority */
        .ql-editor .ql-size-small,
        .ql-editor .ql-size-large,
        .ql-editor .ql-size-huge {
            font-size: inherit !important;
        }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border-color); width: 100%; background: var(--editor-bg); flex-shrink: 0; }
        .status-container { width: 65px; display: inline-block; flex-shrink: 0; }
        #status { font-size: 0.8em; font-weight: 600; }
        .btn-tool { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        /* Sidebar Note Items */
        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { padding: 12px 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; border-radius: 4px; position: relative; }
        .note-item:hover { background: var(--item-hover); }
        .note-item.active { background: var(--item-hover); border-left: 4px solid #007bff; }
        
        .note-title { 
            font-size: 0.85em; 
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: var(--text-color);
        }

        .delete-btn { color: var(--secondary-text); font-weight: bold; padding: 2px 8px; visibility: hidden; cursor: pointer; font-size: 18px; z-index: 10; }
        .delete-btn:hover { color: var(--danger); }
        .note-item:hover .delete-btn { visibility: visible; }

        .radio-group { display: flex; gap: 10px; align-items: center; font-size: 0.75em; color: var(--secondary-text); }

        #task-only-footer { display: none; height: 50px; background: #fff; border-top: 1px solid var(--border-color); align-items: center; padding: 0 20px; justify-content: flex-end; z-index: 4000; flex-shrink: 0; }
        #task-only-footer.visible { display: flex; }

        /* Floating Zen Mode Button */
        .zen-toggle-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 2000;
            display: none; 
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #555;
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }
        .zen-toggle-btn:hover {
            opacity: 1;
            background: var(--item-hover);
        }

        /* Tiny Zen Mode Sidebar Toggle */
        .zen-sidebar-toggle {
            position: absolute;
            top: 5px;
            left: 5px;
            background: transparent;
            border: none;
            color: var(--secondary-text);
            font-size: 14px;
            cursor: pointer;
            padding: 5px;
            opacity: 0.3;
            transition: opacity 0.2s ease, color 0.2s ease;
            z-index: 2000;
            display: none; 
        }
        .zen-sidebar-toggle:hover {
            opacity: 1;
            color: var(--text-color);
        }

        /* Zen Mode State Triggers */
        .editor-area.zen-mode .custom-toolbar-wrapper,
        .editor-area.zen-mode .bottom-bar {
            display: none !important;
        }
        .editor-area.zen-mode .zen-toggle-btn,
        .editor-area.zen-mode .zen-sidebar-toggle {
            display: flex; 
        }
        
        /* Maximize Zen Mode Screen Real Estate */
        .editor-area.zen-mode {
            padding-top: 0; 
        }
        .editor-area.zen-mode .editor-content-wrapper {
            margin-top: 0; 
        }
        .editor-area.zen-mode .ql-editor {
            padding-top: 15px !important; 
        }

        @media (max-width: 768px) {
            .editor-area { padding: 0; } 
            .editor-content-wrapper { margin-top: 0; }
            .custom-toolbar-wrapper { border-top: none; border-left: none; border-right: none; border-radius: 0; }
            .ql-container.ql-snow { border-left: none; border-right: none; border-radius: 0; border-bottom: none; }
            .bottom-bar { padding: 10px; } 

            .toggle-sidebar { width: 32px; padding: 0; }
            .btn-text { display: none; }
            .native-new-btn { width: 32px; padding: 0; font-size: 18px; line-height: 1; }
            .radio-group { display: none; }
            .zen-toggle-btn { right: 10px; bottom: 10px; }
            .zen-sidebar-toggle { top: 5px; left: 5px; }
        }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <button class="native-new-btn" style="width:100%; margin-bottom:10px; margin-left: 0;" onclick="createNewNote()">+ New Note</button>
        <div class="search-container"><input type="text" id="sidebar-search" placeholder="Search titles & content..." oninput="renderNoteList()"></div>
        <div id="note-list" class="note-list"></div>
        <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn-tool" style="width:100%; margin-bottom:5px;" onclick="exportFullDatabase()">Backup Database</button>
            <button class="btn-tool" style="width:100%;" onclick="document.getElementById('import-input').click()">Import Backup</button>
            <input type="file" id="import-input" style="display:none" onchange="importNotes(event)">
        </div>
    </div>

    <div class="main-layout" id="main-layout">
        <div id="todo-container">
            <iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe>
        </div>
        
        <div id="ghost-overlay"></div>
        <div id="resizer"></div>

        <div class="editor-area">
            <button class="zen-sidebar-toggle" onclick="toggleSidebar()" title="Toggle Notes List">☰</button>
            
            <div id="width-wrapper" class="content-width-wrapper">
                <div class="editor-content-wrapper">
                    <div class="custom-toolbar-wrapper">
                        <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                        <div id="toolbar-container"></div>
                        <button class="native-new-btn" onclick="createNewNote()">+ <span class="btn-text">NEW NOTE</span></button>
                    </div>
                    <div id="editor-container"></div>
                </div>
                <div class="bottom-bar">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <div class="status-container">
                            <span id="status">Saved</span>
                        </div>
                        <button class="btn-tool" onclick="toggleTickTick()" id="ticktick-toggle">Split</button>
                        <button class="btn-tool" onclick="setViewMode('tasks')" id="focus-tasks-btn">Tasks (full)</button>
                    </div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <button class="btn-tool" onclick="emailNote()" title="Email Note" style="font-size: 1.1em; padding: 2px 6px;">✉️</button>
                        <button class="btn-tool" onclick="exportSingleNote()" title="Export Note" style="font-size: 1.1em; padding: 2px 6px;">📥</button>
                        
                        <div class="radio-group">
                            <label><input type="radio" name="view-width" value="full" onclick="setWidth('full')" checked> Full</label>
                            <label><input type="radio" name="view-width" value="narrow" onclick="setWidth('narrow')"> Narrow</label>
                        </div>
                        
                        <button class="btn-tool" onclick="toggleZenMode()" title="Hide Toolbars" style="font-size: 1.2em; padding: 0px 6px;">⤢</button>
                    </div>
                </div>
            </div>
            <button id="zen-toggle-btn" class="zen-toggle-btn" onclick="toggleZenMode()" title="Show Toolbars">⤡</button>
        </div>
        <div id="task-only-footer"><button class="btn-tool" onclick="setViewMode('notes')" style="background:#333; color:white; padding:10px 20px; font-weight:bold;">Notes</button></div>
    </div>

<script src="/quill.js"></script>
<script>
    const APP_VERSION = 1.1;
    let currentNoteId = null;
    let saveTimeout = null;
    let currentGlobalSize = localStorage.getItem('global-display-size') || 'false';

    // --- NEW: Custom Soft Break Blot for Shift+Enter ---
    const Embed = Quill.import('blots/embed');
    class SoftBreak extends Embed {
        static create(value) {
            return super.create(value);
        }
    }
    SoftBreak.blotName = 'softbreak';
    SoftBreak.tagName = 'BR';
    Quill.register(SoftBreak);
    // ----------------------------------------------------

    const highlightHandler = function() {
        const range = quill.getSelection();
        if (!range) return;
        const format = quill.getFormat(range);
        quill.format('background', format.background ? false : '#ffff00');
    };

    var quill = new Quill('#editor-container', {
        modules: { 
            toolbar: {
                container: [[{ 'size': ['small', false, 'large', 'huge'] }], ['link'], ['highlight'], ['clean']],
                handlers: { 
                    'highlight': highlightHandler,
                    'size': function(value) {
                        currentGlobalSize = value || 'false';
                        localStorage.setItem('global-display-size', currentGlobalSize);
                        applyGlobalSize(currentGlobalSize);
                    }
                }
            },
            keyboard: {
                bindings: {
                    // --- FIXED: Intercept Shift+Enter ---
                    softBreak: {
                        key: 13, // 13 is the Enter key
                        shiftKey: true,
                        handler: function(range, context) {
                            // Insert the softbreak <br> blot
                            this.quill.insertEmbed(range.index, 'softbreak', true, 'user');
                            
                            // Get the line and our position to see if we are at the end of the paragraph
                            const [line, offset] = this.quill.getLine(range.index + 1);
                            
                            // line.length() includes the hidden newline '\n' at the end of Quill blocks.
                            // If offset equals line.length() - 1, the <br> is at the absolute end.
                            if (offset === line.length() - 1) {
                                // Insert a Zero-Width Space (\uFEFF) to prop open the line for the browser
                                this.quill.insertText(range.index + 1, '\uFEFF', Quill.sources.SILENT);
                            }
                            
                            // Move cursor silently to the line below
                            this.quill.setSelection(range.index + 1, Quill.sources.SILENT);
                            return false; // Prevent default Quill paragraph break
                        }
                    },
                    // -----------------------------------
                    insertDate: {
                        key: 'D', shiftKey: true, shortKey: true,
                        handler: function(range) {
                            const today = new Date();
                            const dateText = `${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')} - `;
                            quill.insertText(range.index, dateText, Quill.sources.USER);
                            quill.setSelection(range.index + dateText.length, 0);
                            return false; 
                        }
                    }
                }
            }
        },
        theme: 'snow'
    });

    document.getElementById('toolbar-container').appendChild(document.querySelector('.ql-toolbar'));

    function applyGlobalSize(val) {
        const sizes = { 'small': '12px', 'false': '14px', 'large': '16px', 'huge': '20px' };
        document.documentElement.style.setProperty('--editor-font-size', sizes[val] || '14px');
        
        const label = document.querySelector('.ql-size .ql-picker-label');
        if (label) {
            if (val === 'false') {
                label.removeAttribute('data-value');
            } else {
                label.setAttribute('data-value', val);
            }
        }
        
        document.querySelectorAll('.ql-size .ql-picker-item').forEach(item => {
            const itemVal = item.getAttribute('data-value') || 'false';
            if (itemVal === val) {
                item.classList.add('ql-selected');
            } else {
                item.classList.remove('ql-selected');
            }
        });
    }

    const mainLayout = document.getElementById('main-layout');
    const resizer = document.getElementById('resizer');
    const todoContainer = document.getElementById('todo-container');
    const editorArea = document.querySelector('.editor-area');
    const ghost = document.getElementById('ghost-overlay');
    const taskOnlyFooter = document.getElementById('task-only-footer');

    const startDrag = (e) => {
        e.preventDefault();
        ghost.style.display = 'block';
        const isVerticalDrag = window.innerWidth < 1000;
        ghost.style.cursor = isVerticalDrag ? 'row-resize' : 'col-resize';
        
        const onMouseMove = (moveEvent) => {
            const clientY = moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY;
            const clientX = moveEvent.touches ? moveEvent.touches[0].clientX : moveEvent.clientX;

            if (isVerticalDrag) {
                let h = (clientY / window.innerHeight) * 100;
                if (h > 5 && h < 90) {
                    todoContainer.style.height = h + '%';
                    localStorage.setItem('ticktick-height', h);
                }
            } else {
                let w = window.innerWidth - clientX;
                if (w > 150 && w < window.innerWidth * 0.8) {
                    todoContainer.style.width = w + 'px';
                    localStorage.setItem('ticktick-width', w);
                }
            }
        };
        
        const stopDrag = () => {
            ghost.style.display = 'none';
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('touchmove', onMouseMove);
            window.removeEventListener('mouseup', stopDrag);
            window.removeEventListener('touchend', stopDrag);
        };
        
        window.addEventListener('mousemove', onMouseMove, { passive: false });
        window.addEventListener('touchmove', onMouseMove, { passive: false });
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);
    };

    resizer.addEventListener('mousedown', startDrag);
    resizer.addEventListener('touchstart', startDrag, { passive: false });

    function setViewMode(mode) {
        if (mode === 'tasks') {
            mainLayout.classList.add('focus-tasks-active');
            todoContainer.classList.add('visible', 'fullscreen');
            resizer.classList.remove('visible');
            resizer.classList.add('hidden-by-focus');
            editorArea.classList.add('hidden');
            taskOnlyFooter.classList.add('visible');
            localStorage.setItem('view-focus-pref', 'tasks');
        } else {
            mainLayout.classList.remove('focus-tasks-active');
            todoContainer.classList.remove('fullscreen');
            editorArea.classList.remove('hidden');
            taskOnlyFooter.classList.remove('visible');
            resizer.classList.remove('hidden-by-focus');
            const wasVisible = localStorage.getItem('ticktick-pref') === 'true';
            todoContainer.classList.toggle('visible', wasVisible);
            resizer.classList.toggle('visible', wasVisible);
            localStorage.setItem('view-focus-pref', 'notes');
        }
    }

    function toggleTickTick() { const isVisible = todoContainer.classList.toggle('visible'); resizer.classList.toggle('visible', isVisible); localStorage.setItem('ticktick-pref', isVisible); }
    function createNewNote() { currentNoteId = Date.now(); quill.setText(`\n`, 'user'); quill.focus(); }
    
    function toggleZenMode() {
        const editorArea = document.querySelector('.editor-area');
        editorArea.classList.toggle('zen-mode');
    }

    function exportFullDatabase() { 
        const raw = localStorage.getItem('my-github-notes'); 
        const blob = new Blob([raw], { type: 'application/json' }); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
        a.download = `notes_tasks_full_backup_${new Date().toISOString().split('T')[0]}.json`; 
        a.click(); 
        
        localStorage.setItem('last-backup-date', Date.now());
    }

    function emailNote() {
        const note = getNotesSafely().find(n => n.id === currentNoteId);
        if (!note) return;
        const subject = encodeURIComponent(note.title);
        const body = encodeURIComponent(quill.getText());
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    function exportSingleNote() {
        const note = getNotesSafely().find(n => n.id === currentNoteId);
        if (!note) return;
        const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${note.title}</title><style>body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; }h1 { color: #333; }.date { color: #888; font-size: 0.9em; margin-bottom: 20px; }p { margin-bottom: 0.8em; }</style></head><body><h1>${note.title}</h1><div class="date">Created: ${new Date(note.date).toLocaleString()}</div><hr><div class="content">${quill.root.innerHTML}</div></body></html>`;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${note.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
        a.click();
    }

    function getNotesSafely() { try { const raw = localStorage.getItem('my-github-notes'); if (!raw) return []; const parsed = JSON.parse(raw); return Array.isArray(parsed) ? parsed : (parsed.data || []); } catch (e) { return []; } }
    function saveNotesInternal(notes) { localStorage.setItem('my-github-notes', JSON.stringify({ version: APP_VERSION, data: notes })); renderNoteList(); }
    
    quill.on('text-change', (delta, old, source) => {
        if (source === 'user') {
            const selection = quill.getSelection();
            if (selection && selection.index >= 2) {
                const text = quill.getText(selection.index - 2, 2);
                if (text === '//') {
                    const format = quill.getFormat(selection.index - 2, 2);
                    const toggleYellow = !format.background;
                    quill.deleteText(selection.index - 2, 2, Quill.sources.USER);
                    setTimeout(() => { quill.format('background', toggleYellow ? '#ffff00' : false, Quill.sources.USER); }, 10);
                }
            }
            document.getElementById('status').innerText = "Saving...";
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(autoSave, 1000);
        }
    });

    function autoSave() {
        let fullText = quill.getText().trim();
        let firstLine = fullText.split('\n')[0].trim() || 'Untitled Note';
        let notes = getNotesSafely();
        const noteData = { id: currentNoteId || Date.now(), title: firstLine, content: quill.getContents(), plainText: quill.getText(), date: new Date().toISOString() };
        const idx = notes.findIndex(n => n.id === currentNoteId);
        if (idx > -1) notes[idx] = noteData; else { notes.push(noteData); currentNoteId = noteData.id; }
        saveNotesInternal(notes);
        localStorage.setItem('last-note-id', currentNoteId);
        document.getElementById('status').innerText = "Saved";
    }

    function renderNoteList() {
        const list = document.getElementById('note-list');
        list.innerHTML = '';
        const notes = getNotesSafely();
        const searchTerm = document.getElementById('sidebar-search').value.toLowerCase().trim();
        notes.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(note => {
            if (searchTerm && !(note.title || "").toLowerCase().includes(searchTerm) && !(note.plainText || "").toLowerCase().includes(searchTerm)) return;
            const div = document.createElement('div');
            div.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
            div.innerHTML = `<div style="flex-grow:1; overflow:hidden; display:flex; flex-direction:column; gap:2px;" onclick="loadNote(${note.id})"><div class="note-title">${note.title || "Untitled"}</div><div style="font-size:0.75em; color:var(--secondary-text);">${new Date(note.date).toLocaleDateString()}</div></div><span class="delete-btn" onclick="event.stopPropagation(); deleteNote(${note.id});">&times;</span>`;
            list.appendChild(div);
        });
    }

    function deleteNote(id) { if (confirm("Delete note?")) { let notes = getNotesSafely().filter(n => n.id !== id); saveNotesInternal(notes); if (currentNoteId === id) { if (notes.length > 0) loadNote(notes[0].id); else createNewNote(); } } }
    function loadNote(id) { const note = getNotesSafely().find(n => n.id === id); if (note) { currentNoteId = note.id; quill.setContents(note.content); renderNoteList(); } }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function setWidth(mode) { document.getElementById('width-wrapper').className = `content-width-wrapper ${mode}`; localStorage.setItem('width-pref', mode); }

    function importNotes(event) {
        const file = event.target.files[0];
        if (!file) return;
        const FileReaderObj = new FileReader();
        FileReaderObj.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                const newData = Array.isArray(imported) ? imported : (imported.data || []);
                if (confirm("Merge notes?")) {
                    const existing = getNotesSafely();
                    const existingIds = new Set(existing.map(n => n.id));
                    saveNotesInternal([...existing, ...newData.filter(n => !existingIds.has(n.id))]);
                }
            } catch (err) { alert("Invalid file."); }
        };
        FileReaderObj.readAsText(file);
    }

    function checkDailyBackup() {
        const lastBackup = localStorage.getItem('last-backup-date');
        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000; 

        if (!lastBackup || (now - parseInt(lastBackup)) > oneDay) {
            if (confirm("It's been over a day since your last backup. Would you like to download a backup database now?")) {
                exportFullDatabase();
            } else {
                localStorage.setItem('last-backup-date', now);
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderNoteList();
        const savedHeight = localStorage.getItem('ticktick-height');
        const savedWidth = localStorage.getItem('ticktick-width');
        if (window.innerWidth < 1000 && savedHeight) todoContainer.style.height = savedHeight + '%';
        if (window.innerWidth >= 1000 && savedWidth) todoContainer.style.width = savedWidth + 'px';
        const focusPref = localStorage.getItem('view-focus-pref');
        if (focusPref === 'tasks') setViewMode('tasks'); else if (localStorage.getItem('ticktick-pref') === 'true') toggleTickTick();
        const wp = localStorage.getItem('width-pref') || 'full';
        setWidth(wp);
        document.querySelector(`input[value="${wp}"]`).checked = true;
        const lastId = localStorage.getItem('last-note-id');
        if (lastId) loadNote(parseInt(lastId)); else createNewNote();
        
        checkDailyBackup();
        
        applyGlobalSize(currentGlobalSize);
        
        const sizeLabel = document.querySelector('.ql-size .ql-picker-label');
        if (sizeLabel) {
            const observer = new MutationObserver(() => {
                const currentDataValue = sizeLabel.getAttribute('data-value') || 'false';
                if (currentDataValue !== currentGlobalSize) {
                    applyGlobalSize(currentGlobalSize);
                }
            });
            observer.observe(sizeLabel, { attributes: true, attributeFilter: ['data-value'] });
        }
    });
</script>
</body>
</html>
