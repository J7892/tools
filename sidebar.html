<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Notes</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100%;
            display: flex; flex-direction: column; overflow: hidden; background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #todo-container { height: 33.3%; width: 100%; overflow: hidden; position: relative; flex-shrink: 0; }
        #todo-frame { 
            position: absolute; top: 0; left: 0; width: 125%; height: 125%; 
            transform: scale(0.8); transform-origin: top left; border: none; 
        }

        #ghost-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 9; }

        #resizer { 
            height: 8px; background: #f8f9fa; border-top: 1px solid #e5e5e5; 
            border-bottom: 1px solid #e5e5e5; cursor: row-resize; width: 100%; 
            z-index: 10; flex-shrink: 0; display: flex; justify-content: center;
            align-items: center; transition: background-color 0.2s ease;
        }
        #resizer:hover { background: #e9ecef; }
        #resizer::after {
            content: ""; width: 32px; height: 3px; background: #ced4da; border-radius: 3px;
        }

        #editor-wrapper { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }
        
        #note-list { 
            width: 0; transition: 0.3s; background: #f4f4f4; 
            border-right: 1px solid #ccc; overflow-y: auto; font-size: 12px;
            flex-shrink: 0; display: flex; flex-direction: column;
        }
        #note-list.open { width: 180px; }
        
        #sidebar-search {
            margin: 8px; padding: 6px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 11px; outline: none; width: calc(100% - 16px); box-sizing: border-box;
        }

        #list-items { flex-grow: 1; overflow-y: auto; }

        .note-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #ddd; cursor: pointer; 
        }
        .note-item:hover { background: #e0e0e0; }
        .note-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; font-weight: 500; }
        
        .delete-btn { 
            color: #cc0000; font-weight: bold; padding: 0 5px; 
            visibility: hidden; cursor: pointer; font-size: 14px;
        }
        .note-item:hover .delete-btn { visibility: visible; }

        #editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        /* Custom Toolbar Header */
        .custom-toolbar-wrapper {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; border-bottom: 1px solid #ccc; 
            padding: 4px 8px; width: 100%; box-sizing: border-box; flex-shrink: 0;
        }
        .toggle-sidebar { 
            background: #333; color: white; cursor: pointer; 
            border: none; font-size: 1.1em; height: 32px; width: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; flex-shrink: 0; margin-right: 4px;
        }
        .ql-toolbar.ql-snow { 
            border: none !important; flex-grow: 1; padding: 0 !important;
            display: flex; align-items: center; flex-wrap: nowrap;
            overflow-x: auto; scrollbar-width: none;
        }
        .ql-toolbar.ql-snow::-webkit-scrollbar { display: none; }
        .ql-snow .ql-stroke { stroke: #333 !important; }
        .ql-snow .ql-fill { fill: #333 !important; }
        .ql-snow .ql-picker { color: #333 !important; }

        .ql-snow .ql-picker.ql-size .ql-picker-label::before { content: 'Normal'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="small"]::before { content: 'Small'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="large"]::before { content: 'Large'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="huge"]::before { content: 'Huge'; }
        
        .ql-highlight { position: relative; width: 28px !important; }
        .ql-highlight::after { 
            content: "H"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #ffff00; padding: 0 5px; border-radius: 2px; border: 1px solid #ccc; 
            font-weight: bold; color: #333; font-size: 12px; pointer-events: none;
        }

        .native-new-btn {
            background-color: #007bff; color: white; border: none; border-radius: 4px;
            padding: 0 12px; font-weight: 600; font-size: 12px; cursor: pointer;
            height: 32px; white-space: nowrap; flex-shrink: 0; 
            display: flex; align-items: center; justify-content: center;
            transition: background-color 0.2s;
        }
        .native-new-btn:hover { background-color: #0056b3; }

        /* Hide text and make button a square on narrow screens */
        @media (max-width: 500px) {
            .native-new-btn .btn-text { display: none; }
            .native-new-btn { padding: 0; width: 32px; font-size: 16px; }
        }

        #editor { flex: 1; overflow-y: auto; border: none !important; }

        /* APPLE NOTES STYLE: First line is an auto-title */
        .ql-editor > *:first-child {
            font-size: 1.4em !important; font-weight: bold !important;
            margin-bottom: 0.5em !important; line-height: 1.2 !important;
        }
        .ql-editor p { margin-bottom: 0.5em !important; } 
        .ql-editor p:last-child { margin-bottom: 0 !important; }

        .toolbar-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 4px 8px; background: #f8f9fa; font-size: 11px; border-top: 1px solid #ccc; 
            flex-shrink: 0; color: #666; flex-wrap: wrap; gap: 4px;
        }
        .status-group { display: flex; gap: 8px; align-items: center; }
        .footer-btn { 
            background: #e9ecef; border: 1px solid #ced4da; padding: 4px 8px; 
            border-radius: 3px; cursor: pointer; font-size: 11px; color: #495057;
        }
        .footer-btn:hover { background: #dde2e6; }
    </style>
</head>
<body>

    <div id="todo-container">
        <iframe id="todo-frame" src="https://ticktick.com/webapp/#q/week/tasks"></iframe>
        <div id="ghost-overlay"></div>
    </div>

    <div id="resizer"></div>

    <div id="editor-wrapper">
        <div id="note-list">
            <div style="padding: 10px; font-weight: bold; border-bottom: 1px solid #ccc; flex-shrink: 0;">My Notes</div>
            <input type="text" id="sidebar-search" placeholder="Search..." oninput="updateListUI()">
            <div id="list-items"></div>
        </div>

        <div id="editor-container">
            <div id="editor"></div>
            <div class="toolbar-footer">
                <div class="status-group">
                    <span id="save-status" style="font-weight: 600;">Ready</span>
                </div>
                <div style="display: flex; gap: 4px;">
                    <button class="footer-btn" onclick="copyNote(event)">Copy</button>
                    <button class="footer-btn" onclick="exportNotes()">Backup</button>
                    <button class="footer-btn" onclick="document.getElementById('import-input').click()">Import</button>
                    <input type="file" id="import-input" style="display:none" accept=".json" onchange="importNotes(event)">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const APP_VERSION = 1.1; 
        let currentNoteId = null;
        
        const highlightHandler = function() {
            const range = quill.getSelection();
            if (!range) return;
            const format = quill.getFormat(range);
            quill.format('background', format.background ? false : '#ffff00');
        };

        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: { 
                toolbar: {
                    container: [
                        [{ 'size': ['small', false, 'large', 'huge'] }], 
                        ['link'], 
                        ['highlight'], 
                        ['clean']
                    ],
                    handlers: { 
                        'highlight': highlightHandler
                    }
                },
                keyboard: {
                    bindings: {
                        highlightShortcut: {
                            key: 'K', shortKey: true, shiftKey: true, handler: highlightHandler
                        },
                        shiftEnter: {
                            key: 13, shiftKey: true,
                            handler: function(range) {
                                quill.insertEmbed(range.index, 'softbreak', true, Quill.sources.USER);
                                quill.setSelection(range.index + 1, Quill.sources.SILENT);
                                return false; 
                            }
                        }
                    }
                }
            }
        });

        // SoftBreak implementation for Shift+Enter 
        const Embed = Quill.import('blots/embed');
        class SoftBreak extends Embed {
            static create(value) { return super.create(value); }
        }
        SoftBreak.blotName = 'softbreak';
        SoftBreak.tagName = 'BR';
        Quill.register(SoftBreak);

        // Build the dynamic UI Header
        const toolbarEl = document.querySelector('.ql-toolbar');
        const customWrapper = document.createElement('div');
        customWrapper.className = 'custom-toolbar-wrapper';
        
        toolbarEl.parentNode.insertBefore(customWrapper, toolbarEl);
        
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'toggle-sidebar';
        toggleBtn.innerHTML = '☰';
        toggleBtn.onclick = toggleList;
        customWrapper.appendChild(toggleBtn);
        
        customWrapper.appendChild(toolbarEl);

        const nativeBtn = document.createElement('button');
        nativeBtn.className = 'native-new-btn';
        nativeBtn.innerHTML = '<span class="plus-sign">+</span><span class="btn-text">&nbsp;NEW NOTE</span>';
        nativeBtn.onclick = createNewNote;
        customWrapper.appendChild(nativeBtn);


        // Shared Database Helpers
        function getNotesSafely() {
            try {
                const raw = localStorage.getItem('my-github-notes');
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : (parsed.data || []);
            } catch (e) { return []; }
        }

        function saveNotesInternal(notes) {
            localStorage.setItem('my-github-notes', JSON.stringify({ version: APP_VERSION, data: notes }));
        }

        // Core Editor Functions
        function loadNote(id) {
            const notes = getNotesSafely();
            const note = notes.find(n => n.id === id);
            
            if (note) {
                currentNoteId = note.id;
                localStorage.setItem('last-note-id', currentNoteId);
                quill.setContents(note.content, 'api'); 
                document.getElementById('save-status').innerText = "Loaded";
                updateListUI();
            } else {
                createNewNote();
            }
        }

        quill.on('text-change', (delta, oldDelta, source) => {
            if (source !== 'user') return; 

            // Check for custom slash-slash highlighting shortcut
            const selection = quill.getSelection();
            if (selection && selection.index >= 2) {
                const text = quill.getText(selection.index - 2, 2);
                if (text === '//') {
                    const format = quill.getFormat(selection.index - 2, 2);
                    const toggleYellow = !format.background;
                    quill.deleteText(selection.index - 2, 2, Quill.sources.USER);
                    setTimeout(() => { quill.format('background', toggleYellow ? '#ffff00' : false, Quill.sources.USER); }, 10);
                }
            }

            let notes = getNotesSafely();
            let fullText = quill.getText().trim();
            let firstLine = fullText.split('\n')[0].trim() || 'Untitled';
            if (firstLine.length > 25) firstLine = firstLine.substring(0, 25) + '...';

            const noteData = { 
                id: currentNoteId || Date.now(), 
                title: firstLine, 
                content: quill.getContents(), 
                date: new Date().toISOString() 
            };
            
            const idx = notes.findIndex(n => n.id === currentNoteId);
            if (idx > -1) notes[idx] = noteData;
            else { notes.push(noteData); currentNoteId = noteData.id; }
            
            saveNotesInternal(notes);
            localStorage.setItem('last-note-id', currentNoteId);
            document.getElementById('save-status').innerText = "Saved";
            updateListUI();
        });

        function createNewNote() {
            currentNoteId = Date.now();
            localStorage.setItem('last-note-id', currentNoteId);

            const today = new Date();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const dateText = `${mm}-${dd} - `;
            
            quill.setContents([]);
            quill.setText(`${dateText}\n\n`, 'user'); 
            
            // Cursor automatically drops right after the date string
            quill.setSelection(dateText.length, 0);
            quill.focus();
        }

        function deleteNote(id, event) {
            event.stopPropagation();
            if (confirm("Delete this note?")) {
                let notes = getNotesSafely().filter(n => n.id !== id);
                saveNotesInternal(notes);
                
                if (currentNoteId === id) {
                    if (notes.length > 0) loadNote(notes[0].id);
                    else createNewNote();
                } else {
                    updateListUI();
                }
            }
        }

        function copyNote(event) {
            const text = quill.getText();
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = originalText, 1500);
            });
        }

        function exportNotes() {
            const raw = localStorage.getItem('my-github-notes');
            if (!raw) return alert("Nothing to backup.");
            const blob = new Blob([raw], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const now = new Date();
            a.href = url;
            a.download = `notes_backup_${now.toISOString().split('T')[0]}.json`;
            a.click();
            localStorage.setItem('last-backup-date', now.toISOString());
        }

        function importNotes(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    const newData = Array.isArray(imported) ? imported : (imported.data || []);
                    if (confirm("Merge imported notes?")) {
                        const existing = getNotesSafely();
                        const existingIds = new Set(existing.map(n => n.id));
                        const merged = [...existing, ...newData.filter(n => !existingIds.has(n.id))];
                        saveNotesInternal(merged);
                        alert("Import successful.");
                        updateListUI();
                    }
                } catch (err) { alert("Invalid file."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // UI and Sync Updates
        function toggleList() {
            document.getElementById('note-list').classList.toggle('open');
        }

        function updateListUI() {
            const listContainer = document.getElementById('list-items');
            listContainer.innerHTML = '';
            const notes = getNotesSafely();
            const searchInput = document.getElementById('sidebar-search');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            notes.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(note => {
                if (searchTerm && !(note.title || '').toLowerCase().includes(searchTerm)) return;

                const item = document.createElement('div');
                item.className = 'note-item';
                if (note.id === currentNoteId) item.style.background = "#e8f0fe";
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'note-title';
                titleSpan.innerText = note.title || 'Untitled';
                titleSpan.onclick = () => loadNote(note.id);
                
                const delBtn = document.createElement('span');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = (e) => deleteNote(note.id, e);
                
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                listContainer.appendChild(item);
            });
        }

        window.addEventListener('storage', (event) => {
            if (event.key === 'my-github-notes') {
                updateListUI();
                const notes = getNotesSafely();
                const currentNote = notes.find(n => n.id === currentNoteId);
                
                if (currentNote) {
                    const currentContent = JSON.stringify(quill.getContents());
                    const newContent = JSON.stringify(currentNote.content);
                    
                    if (currentContent !== newContent) {
                        quill.setContents(currentNote.content, 'api');
                        document.getElementById('save-status').innerText = "Synced";
                    }
                } else if (notes.length > 0) {
                    loadNote(notes[0].id);
                }
            }
            
            if (event.key === 'last-note-id') {
                const newId = parseInt(event.newValue);
                if (newId && newId !== currentNoteId) {
                    const note = getNotesSafely().find(n => n.id === newId);
                    if (note) {
                        currentNoteId = note.id;
                        quill.setContents(note.content, 'api');
                        updateListUI();
                    }
                }
            }
        });

        // Resizer 
        const resizer = document.getElementById('resizer');
        const todoContainer = document.getElementById('todo-container');
        const ghost = document.getElementById('ghost-overlay');

        resizer.addEventListener('mousedown', (e) => {
            ghost.style.display = 'block';
            const move = (e) => {
                let h = (e.clientY / window.innerHeight) * 100;
                if (h > 5 && h < 95) todoContainer.style.height = h + '%';
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', () => {
                ghost.style.display = 'none';
                document.removeEventListener('mousemove', move);
            });
        });

        // Initialization
        const initialNotes = getNotesSafely();
        const lastSavedId = parseInt(localStorage.getItem('last-note-id'));
        
        if (initialNotes.find(n => n.id === lastSavedId)) {
            loadNote(lastSavedId);
        } else if (initialNotes.length > 0) {
            loadNote(initialNotes[0].id);
        } else {
            createNewNote();
        }
    </script>
</body>
</html>
