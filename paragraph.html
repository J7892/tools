<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Squeezer</title>
    <style>
        :root {
            --bg: #f4f4f9;
            --text: #333;
            --accent: #4a90e2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.5;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        button:hover { opacity: 0.8; }
        .status { margin-left: auto; color: #666; font-size: 14px; align-self: center; }
    </style>
</head>
<body>

    <h2>Paragraph Squeezer</h2>
    <p>Paste your text below to collapse multiple line breaks into one.</p>

    <textarea id="inputText" placeholder="Paste messy text here..."></textarea>

    <div class="controls">
        <button class="btn-primary" onclick="squeezeText()">Squeeze & Clean</button>
        <button class="btn-secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        <span id="statusMessage" class="status"></span>
    </div>

    <script>
        function squeezeText() {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;

            // The Logic:
            // 1. Replace 2 or more line breaks with exactly one line break
            // 2. Trim whitespace from the start/end of the whole block
            const cleaned = text
                .replace(/\n\s*\n/g, '\n') // Find double breaks (with possible hidden spaces) and make them single
                .trim();

            textArea.value = cleaned;
            showStatus("Cleaned!");
        }

        function copyToClipboard() {
            const textArea = document.getElementById('inputText');
            textArea.select();
            document.execCommand('copy');
            showStatus("Copied to clipboard!");
        }

        function showStatus(msg) {
            const status = document.getElementById('statusMessage');
            status.innerText = msg;
            setTimeout(() => { status.innerText = ""; }, 2000);
        }
    </script>
</body>
</html>
