<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Squeezer</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #2d3436;
            --accent: #0984e3;
            --border: #dfe6e9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        h2 { 
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 450px;
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            /* This line creates the 0.8em visual paragraph spacing */
            line-height: 1.6;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
            white-space: pre-wrap;
        }
        /* Custom styling to simulate paragraph gaps inside the textarea */
        textarea:focus {
            border-color: var(--accent);
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #636e72; color: white; }
        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }
        .status { 
            font-size: 14px; 
            color: #00b894; 
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h2>Paragraph Squeezer</h2>
    <p>Paste text with double line breaks. This tool will clean the data while keeping them visually distinct.</p>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>

    <div class="controls">
        <button class="btn-primary" onclick="squeezeText()">Squeeze & Clean</button>
        <button class="btn-secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        <span id="statusMessage" class="status"></span>
    </div>

    <script>
        function squeezeText() {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;

            // 1. Convert all occurrences of multiple newlines (and any whitespace between them) 
            // into a single newline character.
            const cleaned = text
                .replace(/\n\s*\n/g, '\n') 
                .trim();

            textArea.value = cleaned;
            showStatus("Lines collapsed!");
        }

        function copyToClipboard() {
            const textArea = document.getElementById('inputText');
            if (!textArea.value) return;
            
            textArea.select();
            document.execCommand('copy');
            showStatus("Copied to clipboard!");
        }

        function showStatus(msg) {
            const status = document.getElementById('statusMessage');
            status.innerText = msg;
            setTimeout(() => { status.innerText = ""; }, 2500);
        }
    </script>
</body>
</html>
