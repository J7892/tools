<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Squeezer</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #2d3436;
            --accent: #0984e3;
            --border: #dfe6e9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        h2 { 
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }
        #editor {
            width: 100%;
            min-height: 450px;
            padding: 25px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: white;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            overflow-y: auto;

            /* THE FIX: Force every child div to have a bottom margin */
            line-height: 1.5;
        }
        
        /* This ensures that after we "Squeeze", the new divs have spacing */
        #editor div {
            margin-bottom: 0.8em;
            min-height: 1em;
        }

        #editor:focus { border-color: var(--accent); }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #636e72; color: white; }
        button:active { transform: scale(0.98); }
        .status { font-size: 14px; color: #00b894; font-weight: 600; }
    </style>
</head>
<body>

    <h2>Paragraph Squeezer</h2>
    <p>Paste messy text. This version rebuilds the HTML structure to keep your 0.8 spacing after cleaning.</p>

    <div id="editor" contenteditable="true" spellcheck="false"></div>

    <div class="controls">
        <button class="btn-primary" onclick="squeezeText()">Squeeze & Clean</button>
        <button class="btn-secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        <span id="statusMessage" class="status"></span>
    </div>

    <script>
        function squeezeText() {
            const editor = document.getElementById('editor');
            
            // 1. Get raw text and collapse double/triple breaks into single breaks
            let rawText = editor.innerText.replace(/\n\s*\n/g, '\n').trim();
            
            // 2. Split text into an array of paragraphs
            let paragraphs = rawText.split('\n');

            // 3. Rebuild the editor's inner HTML so each paragraph is a <div>
            // This is what preserves the visual CSS spacing!
            editor.innerHTML = paragraphs
                .map(p => `<div>${p}</div>`)
                .join('');

            showStatus("Squeezed & Formatted!");
        }

        async function copyToClipboard() {
            const editor = document.getElementById('editor');
            // We still use innerText for copying because it returns clean text 
            // with single line breaks, ignoring our visual div margins.
            const text = editor.innerText;
            
            try {
                await navigator.clipboard.writeText(text);
                showStatus("Copied to clipboard!");
            } catch (err) {
                showStatus("Error copying.");
            }
        }

        function showStatus(msg) {
            const status = document.getElementById('statusMessage');
            status.innerText = msg;
            setTimeout(() => { status.innerText = ""; }, 2500);
        }
    </script>
</body>
</html>
