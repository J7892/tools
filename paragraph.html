<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Squeezer</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #2d3436;
            --accent: #0984e3;
            --border: #dfe6e9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        h2 { 
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
        }
        /* This container replaces the textarea */
        #editor {
            width: 100%;
            min-height: 450px;
            padding: 25px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.4; /* Normal line height for reading */
            background: white;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        #editor:focus { border-color: var(--accent); }

        /* Here is the magic: we inject visual space between blocks of text */
        #editor div, #editor p {
            margin-bottom: 0.8em;
            display: block;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #636e72; color: white; }
        button:active { transform: scale(0.98); }
        .status { font-size: 14px; color: #00b894; font-weight: 600; }
    </style>
</head>
<body>

    <h2>Paragraph Squeezer</h2>
    <p>Paste text below. It will automatically clean double-breaks and apply visual spacing.</p>

    <div id="editor" contenteditable="true" placeholder="Paste your text here..."></div>

    <div class="controls">
        <button class="btn-primary" onclick="squeezeText()">Squeeze & Clean</button>
        <button class="btn-secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        <span id="statusMessage" class="status"></span>
    </div>

    <script>
        function squeezeText() {
            const editor = document.getElementById('editor');
            // We use innerText to get the raw text content
            let text = editor.innerText;

            // 1. Collapse multiple breaks into one
            const cleaned = text
                .replace(/\n\s*\n/g, '\n')
                .trim();

            // 2. Put it back. By setting innerText, the browser 
            // will handle the "visual" wrapping for us.
            editor.innerText = cleaned;
            showStatus("Cleaned & Spaced!");
        }

        function copyToClipboard() {
            const editor = document.getElementById('editor');
            const text = editor.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                showStatus("Copied to clipboard!");
            });
        }

        function showStatus(msg) {
            const status = document.getElementById('statusMessage');
            status.innerText = msg;
            setTimeout(() => { status.innerText = ""; }, 2500);
        }

        // Handle placeholder behavior for contenteditable
        const editor = document.getElementById('editor');
        editor.addEventListener('focus', function() {
            if (this.innerText === this.getAttribute('placeholder')) {
                this.innerText = '';
            }
        });
    </script>
</body>
</html>
