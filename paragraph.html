<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Fixer</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #2d3436;
            --accent: #0984e3;
            --border: #dfe6e9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        h2 { 
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
        }
        #editor {
            width: 100%;
            min-height: 450px;
            padding: 25px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: white;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            overflow-y: auto;
            line-height: 1.5;
        }
        
        #editor div {
            margin-bottom: 0.8em;
            min-height: 1em;
        }

        #editor:focus { border-color: var(--accent); }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #636e72; color: white; }
        .btn-outline { background: #fff; color: var(--accent); border: 2px solid var(--accent); padding: 10px 22px; }
        button:active { transform: scale(0.98); }
        .status { font-size: 14px; color: #00b894; font-weight: 600; }
    </style>
</head>
<body>

    <h2>Paragraph Fixer</h2>
    <p>Paste text below to fix line breaks, eliminate double spaces, and format quotes.</p>

    <div id="editor" contenteditable="true" spellcheck="false"></div>

    <div class="controls">
        <button class="btn-primary" onclick="fixText()">Fix Text</button>
        <button class="btn-outline" onclick="smartQuotes()">Smart Quotes</button>
        <button class="btn-secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        <span id="statusMessage" class="status"></span>
    </div>

    <script>
        // Helper to refresh the visual 0.8 spacing divs
        function refreshEditor(text) {
            const editor = document.getElementById('editor');
            let paragraphs = text.split('\n');
            editor.innerHTML = paragraphs
                .map(p => `<div>${p}</div>`)
                .join('');
        }

        function fixText() {
            const editor = document.getElementById('editor');
            let text = editor.innerText;

            let cleaned = text
                .replace(/[ ]{2,}/g, ' ')  
                .replace(/\n\s*\n/g, '\n') 
                .trim();
            
            refreshEditor(cleaned);
            showStatus("Fixed!");
        }

        function smartQuotes() {
            const editor = document.getElementById('editor');
            let text = editor.innerText;

            // Logic for Smart Quotes
            let smart = text
                // Double quotes
                .replace(/"(?=\w)/g, '“')     // Opening double
                .replace(/"/g, '”')            // Closing double
                // Single quotes / Apostrophes
                .replace(/'(?=\w)/g, '‘')     // Opening single
                .replace(/'/g, '’');           // Closing single (and apostrophes)

            refreshEditor(smart);
            showStatus("Quotes Curled!");
        }

        async function copyToClipboard() {
            const editor = document.getElementById('editor');
            const text = editor.innerText;
            
            try {
                await navigator.clipboard.writeText(text);
                showStatus("Copied to clipboard!");
            } catch (err) {
                showStatus("Error copying.");
            }
        }

        function showStatus(msg) {
            const status = document.getElementById('statusMessage');
            status.innerText = msg;
            setTimeout(() => { status.innerText = ""; }, 2500);
        }
    </script>
</body>
</html>
