<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    
    <link href="quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --sidebar-bg: white;
            --editor-bg: white;
            --text-color: #333;
            --secondary-text: #888;
            --border-color: #ddd;
            --item-hover: #f0f0f0;
            --toolbar-bg: #fff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --sidebar-bg: #2d2d2d;
            --editor-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --secondary-text: #aaa;
            --border-color: #444;
            --item-hover: #3d3d3d;
            --toolbar-bg: #333;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg-color); color: var(--text-color);
            height: 100vh; overflow: hidden; display: flex; 
        }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease, background 0.3s; 
            margin-left: -280px; height: 100vh; z-index: 1000;
        }
        .sidebar.open { margin-left: 0; }
        .search-container { margin-bottom: 10px; }
        #sidebar-search { 
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 0.85em; 
            background: var(--editor-bg); color: var(--text-color);
        }
        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { 
            padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 4px; transition: background 0.2s;
        }
        .note-item:hover { background: var(--item-hover); }

        /* Editor Area */
        .editor-area { 
            flex-grow: 1; 
            background: var(--editor-bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 20px 40px 10px 60px; 
            position: relative; 
            min-width: 0; 
            align-items: center; 
            transition: background 0.3s; 
        }
        
        .content-width-wrapper { width: 100%; max-width: 100%; display: flex; flex-direction: column; flex-grow: 1; min-height: 0; transition: max-width 0.3s ease; }
        .content-width-wrapper.narrow { max-width: 800px; }

        .header-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%; flex-shrink: 0; }
        input#note-title { 
            flex-grow: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1.5em; font-weight: bold; outline: none;
            background: var(--editor-bg); color: var(--text-color);
        }
        
        .editor-content-wrapper { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; overflow: hidden; }
        
        /* Quill UI */
        .ql-toolbar.ql-snow { 
            background: var(--toolbar-bg); 
            border-color: var(--border-color) !important; 
            flex-shrink: 0; 
            white-space: nowrap;
            overflow-x: auto;
        }
        .ql-container.ql-snow { 
            border-color: var(--border-color) !important; 
            background: var(--editor-bg); 
            color: var(--text-color);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .ql-stroke { stroke: var(--text-color) !important; }
        .ql-fill { fill: var(--text-color) !important; }
        .ql-picker { color: var(--text-color) !important; }
        [data-theme="dark"] .ql-picker-options { background-color: var(--sidebar-bg) !important; color: var(--text-color) !important; border-color: var(--border-color) !important; }

        /* Color Icon Fix */
        .ql-snow.ql-toolbar .ql-color .ql-picker-label svg .ql-stroke { stroke: inherit !important; }
        .ql-snow.ql-toolbar .ql-color .ql-picker-label svg .ql-fill { fill: inherit !important; }

        /* Size Dropdown Labels */
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="small"]::before { content: 'Small'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="large"]::before { content: 'Large'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="huge"]::before { content: 'Huge'; }

        #editor-container { 
            flex-grow: 1; 
            border-bottom-left-radius: 4px; 
            border-bottom-right-radius: 4px; 
            display: flex;
            flex-direction: column;
            min-height: 0; 
        }
        .ql-editor { flex-grow: 1; overflow-y: auto; padding-bottom: 40px; }
        .ql-editor p { margin-bottom: 1.5em !important; } 

        /* Zoom Classes */
        #editor-container.zoom-small .ql-editor { font-size: 13px; }
        #editor-container.zoom-normal .ql-editor { font-size: 16px; }
        #editor-container.zoom-large .ql-editor { font-size: 20px; }
        #editor-container.zoom-huge .ql-editor { font-size: 28px; }

        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .btn-new-main { background: #007bff; color: white; font-size: 1.4em; padding: 4px 16px; height: 50px; flex-shrink: 0; }
        .btn-new-sidebar { background: #007bff; color: white; margin-bottom: 10px; width: 100%; }
        .btn-export { background: #6c757d; color: white; margin-top: 10px; font-size: 0.8em; width: 100%; }
        .btn-export.needs-backup { background: #fd7e14; animation: pulse-border 2s infinite; }
        .btn-delete { background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .btn-nuclear { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d !important; margin-top: 15px; font-size: 0.75em; width: 100%; opacity: 0.7; transition: opacity 0.2s; }
        .btn-copy, .btn-secondary-tool { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); }

        .toggle-sidebar { 
            background: #333; color: white; padding: 0 15px; cursor: pointer; 
            border-radius: 4px; border: none; font-size: 1.2em; height: 50px; 
            display: flex; align-items: center; justify-content: center;
            position: absolute; left: 0; top: 20px; z-index: 1100;
            border-radius: 0 4px 4px 0;
        }

        /* Responsive Bottom Bar */
        .bottom-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            border-top: 1px solid var(--border-color); 
            margin-top: 10px; 
            width: 100%; 
            flex-shrink: 0; 
            background: var(--editor-bg); 
            z-index: 10; 
            position: relative; 
            flex-wrap: wrap; 
            gap: 10px;
        }
        .status-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .save-status { font-size: 0.85em; color: #28a745; font-weight: 600; min-width: 60px; }
        .stats-text { font-size: 0.8em; color: var(--secondary-text); }
        .backup-nag { font-size: 0.75em; color: #fd7e14; font-weight: bold; display: none; }
        .width-toggle-group { display: flex; align-items: center; gap: 5px; font-size: 0.75em; color: var(--secondary-text); }
        
        /* Mobile/Narrow Screen Fixes */
        @media (max-width: 768px) {
            .editor-area { padding: 10px; }
            .toggle-sidebar { 
                position: static; 
                margin-right: 10px;
                border-radius: 4px;
                height: 50px;
            }
            .btn-new-main {
                position: fixed;
                right: 20px;
                bottom: 80px;
                width: 56px;
                height: 56px;
                border-radius: 50%;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                z-index: 1200;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                font-size: 2em;
            }
            .ql-editor { padding-bottom: 100px; }
            .bottom-bar { justify-content: center; text-align: center; }
            .status-group { justify-content: center; }
        }

        .ql-highlight:after { content: "H"; background: #ffff00; padding: 0 4px; border-radius: 2px; border: 1px solid #ccc; font-weight: bold; color: #333; }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(253, 126, 20, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(253, 126, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 126, 20, 0); }
        }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <button class="btn-new-sidebar" onclick="createNewNote()">+ New Note</button>
        <div class="search-container">
            <input type="text" id="sidebar-search" placeholder="Search titles and content..." oninput="renderNoteList()">
        </div>
        <div id="note-list" class="note-list"></div>
        <button id="export-btn" class="btn-export" onclick="exportNotes()">Download Backup (JSON)</button>
        <span id="last-backup-text" style="font-size: 0.7em; color: var(--secondary-text); text-align: center; display: block; margin: 5px 0;"></span>
        <button class="btn-import" style="width: 100%; margin-top: 5px; font-size: 0.8em;" onclick="document.getElementById('import-input').click()">Import Backup (JSON)</button>
        <input type="file" id="import-input" style="display:none" accept=".json" onchange="importNotes(event)">
        <button class="btn-nuclear" onclick="nuclearDelete()">☢ Clear All Notes</button>
    </div>

    <div class="editor-area">
        <div id="width-wrapper" class="content-width-wrapper">
            <div class="header-controls">
                <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                <input type="text" id="note-title" placeholder="Note Title..." oninput="handleInput()">
                <button class="btn-new-main" onclick="createNewNote()" title="New Note">+</button>
            </div>

            <div class="editor-content-wrapper">
                <div id="editor-container" class="zoom-normal"></div>
            </div>

            <div class="bottom-bar">
                <div class="status-group">
                    <span id="status" class="save-status">Saved</span>
                    <span id="stats-display" class="stats-text">0 words | 0 chars</span>
                    <button class="btn-secondary-tool" onclick="toggleFullscreen()" id="fullscreen-toggle">⛶ Fullscreen</button>
                    <button class="btn-secondary-tool" onclick="toggleTheme()" id="theme-toggle">🌙 Dark</button>
                    <button class="btn-copy" onclick="copyNote()">Copy Text</button>
                    <span id="backup-nag" class="backup-nag">⚠️ Weekly Backup Due</span>
                </div>
                
                <div class="width-toggle-group">
                    <label><input type="radio" name="width" value="full" onchange="setWidth('full')" checked> Full</label>
                    <label><input type="radio" name="width" value="narrow" onchange="setWidth('narrow')"> Narrow</label>
                </div>
            </div>
        </div>
    </div>

<script src="quill.js"></script>

<script>
    const highlightHandler = function() {
        const range = quill.getSelection();
        if (!range) return;
        const format = quill.getFormat(range);
        quill.format('background', format.background ? false : '#ffff00');
    };

    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: {
                container: [
                    [{ 'size': ['small', false, 'large', 'huge'] }], 
                    ['bold', 'italic', 'underline', 'link'], 
                    ['highlight'], 
                    [{ 'background': ['#ffff00', '#ced4da', '#d4edda', '#f8d7da', false] }], 
                    [{ 'color': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ],
                handlers: { 
                    'highlight': highlightHandler,
                    'size': function(value) {
                        const editorContainer = document.getElementById('editor-container');
                        editorContainer.classList.remove('zoom-small', 'zoom-normal', 'zoom-large', 'zoom-huge');
                        const zoomClass = value ? `zoom-${value}` : 'zoom-normal';
                        editorContainer.classList.add(zoomClass);
                        localStorage.setItem('zoom-pref', value || 'normal');
                    }
                }
            },
            clipboard: { matchVisual: false },
            keyboard: {
                bindings: {
                    highlightShortcut: { key: 'K', shortKey: true, shiftKey: true, handler: highlightHandler }
                }
            }
        },
        theme: 'snow'
    });

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme-pref', theme);
        document.getElementById('theme-toggle').innerText = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    function toggleTheme() {
        applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    document.addEventListener('fullscreenchange', () => {
        document.getElementById('fullscreen-toggle').innerText = document.fullscreenElement ? "✖ Exit" : "⛶ Fullscreen";
    });

    function updateStats() {
        const range = quill.getSelection();
        let text = (range && range.length > 0) ? quill.getText(range.index, range.length).trim() : quill.getText().trim();
        document.getElementById('stats-display').style.color = (range && range.length > 0) ? "#007bff" : "var(--secondary-text)";
        const words = text.length > 0 ? text.split(/\s+/).length : 0;
        document.getElementById('stats-display').innerText = `${words} words | ${text.length} chars`;
    }

    quill.on('selection-change', updateStats);

    function handleInput() {
        isDirty = true;
        document.getElementById('status').innerText = "Saving...";
        document.getElementById('status').style.color = "#ff9800";
        updateStats();
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(autoSave, 1000);
    }

    function nuclearDelete() {
        if (confirm("Permanently delete ALL notes?") && confirm("Proceed with total wipe?")) {
            localStorage.removeItem('my-github-notes');
            currentNoteId = null;
            createNewNote();
            renderNoteList();
        }
    }

    quill.root.addEventListener('paste', function(e) {
        const range = quill.getSelection();
        if (range && range.length > 0) {
            const pastedText = (e.clipboardData || window.clipboardData).getData('text/plain').trim();
            if (/^(https?:\/\/[^\s]+|www\.[^\s]+)$/i.test(pastedText)) {
                e.preventDefault(); e.stopPropagation(); 
                let url = pastedText.startsWith('http') ? pastedText : 'https://' + pastedText;
                quill.formatText(range.index, range.length, 'link', url);
            }
        }
    }, true); 

    let currentNoteId = null;
    let saveTimeout = null;
    let isDirty = false;

    window.onload = () => { 
        renderNoteList();
        checkBackupStatus();
        document.getElementById('sidebar').classList.remove('open');
        const widthPref = localStorage.getItem('width-pref') || 'full';
        setWidth(widthPref);
        document.querySelector(`input[value="${widthPref}"]`).checked = true;
        applyTheme(localStorage.getItem('theme-pref') || 'light');

        const savedZoom = localStorage.getItem('zoom-pref') || 'normal';
        document.getElementById('editor-container').classList.add(`zoom-${savedZoom}`);
        
        const sizePicker = document.querySelector('.ql-size');
        if (sizePicker) {
            const options = sizePicker.querySelector('.ql-picker-options');
            const target = options.querySelector(`[data-value="${savedZoom === 'normal' ? '' : savedZoom}"]`);
            if (target) target.click(); 
        }

        createNewNote();
    };

    window.onbeforeunload = function() { if (isDirty) return "Unsaved changes."; };

    function setWidth(mode) {
        const wrapper = document.getElementById('width-wrapper');
        if (mode === 'narrow') wrapper.classList.add('narrow');
        else wrapper.classList.remove('narrow');
        localStorage.setItem('width-pref', mode);
    }

    function copyNote() {
        navigator.clipboard.writeText(quill.getText()).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = 'Copy Text', 2000);
        });
    }

    function toggleSidebar() { 
        const isOpen = document.getElementById('sidebar').classList.toggle('open');
        localStorage.setItem('sidebar-open', isOpen);
    }

    quill.on('text-change', (delta, oldDelta, source) => {
        if (source === 'user') {
            handleInput();
            const selection = quill.getSelection();
            if (selection && selection.index >= 2) {
                const text = quill.getText(selection.index - 2, 2);
                if (text === '//' && quill.getText(selection.index - 3, 1) !== ':') {
                    const format = quill.getFormat(selection.index - 2);
                    quill.deleteText(selection.index - 2, 2);
                    quill.format('background', format.background ? false : '#ffff00');
                }
            }
            if (delta.ops.length > 0) {
                const lastOp = delta.ops[delta.ops.length - 1];
                if (typeof lastOp.insert === 'string' && (lastOp.insert === ' ' || lastOp.insert === '\n')) {
                    const textBefore = quill.getText(Math.max(0, selection.index - 101), selection.index - 1);
                    const lastWord = textBefore.split(/[\s\n]/).pop();
                    if (lastWord && /^(https?:\/\/[^\s]+|www\.[^\s]+)$/i.test(lastWord)) {
                        quill.formatText(selection.index - 1 - lastWord.length, lastWord.length, 'link', lastWord.startsWith('http') ? lastWord : 'https://' + lastWord);
                    }
                }
            }
        }
    });

    function autoSave() {
        const title = document.getElementById('note-title').value || "Untitled Note";
        let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const noteData = { id: currentNoteId || Date.now(), title, content: quill.getContents(), date: new Date().toISOString() };
        if (currentNoteId) {
            const idx = notes.findIndex(n => n.id === currentNoteId);
            if (idx > -1) notes[idx] = noteData;
        } else {
            notes.push(noteData);
            currentNoteId = noteData.id;
        }
        localStorage.setItem('my-github-notes', JSON.stringify(notes));
        renderNoteList();
        isDirty = false;
        document.getElementById('status').innerText = "Saved";
        document.getElementById('status').style.color = "#28a745";
    }

    function checkBackupStatus() {
        const lastBackup = localStorage.getItem('last-export-date');
        if (!lastBackup) return;
        const lastDate = new Date(lastBackup);
        document.getElementById('last-backup-text').innerText = `Last backup: ${lastDate.toLocaleDateString()}`;
        if (Math.ceil(Math.abs(new Date() - lastDate) / 86400000) >= 7) {
            document.getElementById('backup-nag').style.display = "inline";
            document.getElementById('export-btn').classList.add('needs-backup');
        }
    }

    function renderNoteList() {
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const term = document.getElementById('sidebar-search').value.toLowerCase();
        const list = document.getElementById('note-list');
        list.innerHTML = '';
        const filtered = notes.filter(n => n.title.toLowerCase().includes(term) || n.content.ops.map(op => typeof op.insert === 'string' ? op.insert : '').join('').toLowerCase().includes(term)).sort((a, b) => new Date(b.date) - new Date(a.date));
        filtered.forEach(note => {
            const div = document.createElement('div');
            div.className = 'note-item';
            div.innerHTML = `<div style="flex-grow:1; overflow:hidden; padding-right: 10px;" onclick="loadNote(${note.id})"><div style="white-space:nowrap; text-overflow:ellipsis; overflow:hidden; font-weight: 500; color: var(--text-color);">${note.title || "Untitled Note"}</div><div style="font-size: 0.75em; color: var(--secondary-text); margin-top: 3px;">${new Date(note.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</div></div><button class="btn-delete" onclick="deleteNote(${note.id})">×</button>`;
            list.appendChild(div);
        });
    }

    function loadNote(id) {
        if (isDirty && !confirm("Discard unsaved changes?")) return;
        const note = JSON.parse(localStorage.getItem('my-github-notes') || '[]').find(n => n.id === id);
        if (note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            quill.setContents(note.content);
            isDirty = false;
            document.getElementById('status').innerText = "Saved";
            document.getElementById('status').style.color = "#28a745";
            updateStats();
        }
    }

    function createNewNote() {
        if (isDirty && !confirm("Discard changes?")) return;
        currentNoteId = null; isDirty = false;
        document.getElementById('note-title').value = '';
        quill.setContents([]);
        document.getElementById('status').innerText = "New Note";
        updateStats();
        document.getElementById('note-title').focus();
    }

    function deleteNote(id) {
        if (confirm("Delete this note?")) {
            let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]').filter(n => n.id !== id);
            localStorage.setItem('my-github-notes', JSON.stringify(notes));
            if (currentNoteId === id) createNewNote();
            renderNoteList();
        }
    }

    function exportNotes() {
        const notes = localStorage.getItem('my-github-notes');
        if (!notes || notes === "[]") return alert("No notes!");
        localStorage.setItem('last-export-date', new Date().toISOString());
        checkBackupStatus();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([notes], { type: 'application/json' }));
        a.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importNotes(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                const existing = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
                const existingIds = new Set(existing.map(n => n.id));
                localStorage.setItem('my-github-notes', JSON.stringify([...existing, ...imported.filter(n => !existingIds.has(n.id))]));
                renderNoteList();
                alert("Import complete.");
            } catch (err) { alert("Error."); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }
</script>
</body>
</html>
