<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    
    <link href="quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f5f5;
            --sidebar-bg: white;
            --editor-bg: white;
            --text-color: #333;
            --secondary-text: #888;
            --border-color: #ddd;
            --item-hover: #f0f0f0;
            --toolbar-bg: #fff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --sidebar-bg: #2d2d2d;
            --editor-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --secondary-text: #aaa;
            --border-color: #444;
            --item-hover: #3d3d3d;
            --toolbar-bg: #333;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg-color); color: var(--text-color);
            height: 100vh; overflow: hidden; display: flex; 
        }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease, background 0.3s; 
            margin-left: -280px; height: 100vh; z-index: 1000;
        }
        .sidebar.open { margin-left: 0; }
        .search-container { margin-bottom: 10px; }
        #sidebar-search { 
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 0.85em; 
            background: var(--editor-bg); color: var(--text-color);
        }
        .note-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .note-item { 
            padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 4px; transition: background 0.2s;
        }
        .note-item:hover { background: var(--item-hover); }
        .note-list-empty { padding: 20px 10px; text-align: center; color: var(--secondary-text); font-size: 0.85em; }

        /* Editor Area */
        .editor-area { flex-grow: 1; background: var(--editor-bg); height: 100vh; display: flex; flex-direction: column; padding: 20px 40px 10px 60px; position: relative; min-width: 0; align-items: center; transition: background 0.3s; }
        .content-width-wrapper { width: 100%; max-width: 100%; display: flex; flex-direction: column; flex-grow: 1; min-height: 0; transition: max-width 0.3s ease; }
        .content-width-wrapper.narrow { max-width: 800px; }

        .header-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; width: 100%; flex-shrink: 0; }
        input#note-title { 
            flex-grow: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1.5em; font-weight: bold; outline: none;
            background: var(--editor-bg); color: var(--text-color);
        }
        
        .editor-content-wrapper { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; width: 100%; }
        
        /* Quill Toolbar Adjustments */
        .ql-toolbar.ql-snow { background: var(--toolbar-bg); border-color: var(--border-color) !important; flex-shrink: 0; }
        .ql-container.ql-snow { border-color: var(--border-color) !important; background: var(--editor-bg); color: var(--text-color); }
        .ql-stroke { stroke: var(--text-color) !important; }
        .ql-fill { fill: var(--text-color) !important; }
        .ql-picker { color: var(--text-color) !important; }
        [data-theme="dark"] .ql-picker-options { background-color: var(--sidebar-bg) !important; color: var(--text-color) !important; border-color: var(--border-color) !important; }

        #editor-container { flex-grow: 1; font-size: 16px; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; height: auto !important; min-height: 0; overflow: hidden; }
        .ql-editor { height: 100%; overflow-y: auto; padding-bottom: 40px; }
        .ql-editor p { margin-bottom: 1.5em !important; } 

        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .btn-new-main { background: #007bff; color: white; font-size: 1.4em; padding: 4px 16px; height: 50px; }
        .btn-new-sidebar { background: #007bff; color: white; margin-bottom: 10px; width: 100%; }
        .btn-export { background: #6c757d; color: white; margin-top: 10px; font-size: 0.8em; width: 100%; }
        .btn-export.needs-backup { background: #fd7e14; animation: pulse-border 2s infinite; }
        .btn-import { background: var(--item-hover); color: var(--text-color); border: 1px solid var(--border-color) !important; margin-top: 5px; font-size: 0.8em; width: 100%; }
        .btn-delete { background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .btn-nuclear { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d !important; margin-top: 15px; font-size: 0.75em; width: 100%; opacity: 0.7; transition: opacity 0.2s, background 0.2s; }
        .btn-nuclear:hover { opacity: 1; background: rgba(255, 77, 77, 0.1); }
        .btn-copy { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); margin-left: 10px; }
        .btn-secondary-tool { background: var(--item-hover); color: var(--text-color); font-size: 0.75em; border: 1px solid var(--border-color); }

        .toggle-sidebar { 
            position: absolute; left: 0; top: 20px; z-index: 1100;
            background: #333; color: white; padding: 0 15px; cursor: pointer; 
            border-radius: 0 4px 4px 0; border: none; font-size: 1.2em; height: 50px; 
            display: flex; align-items: center; justify-content: center;
        }

        .bottom-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border-color); margin-top: 10px; width: 100%; flex-shrink: 0; background: var(--editor-bg); z-index: 10; position: relative; transition: background 0.3s; }
        .status-group { display: flex; gap: 10px; align-items: center; }
        .save-status { font-size: 0.85em; color: #28a745; font-weight: 600; min-width: 60px; }
        .stats-text { font-size: 0.8em; color: var(--secondary-text); margin-right: 5px; }
        .backup-nag { font-size: 0.75em; color: #fd7e14; font-weight: bold; display: none; }
        .last-backup-text { font-size: 0.75em; color: var(--secondary-text); display: block; margin-top: 4px; text-align: center; }
        .width-toggle-group { display: flex; align-items: center; gap: 5px; font-size: 0.75em; color: var(--secondary-text); }

        .ql-highlight:after { content: "H"; background: #ffff00; padding: 0 4px; border-radius: 2px; border: 1px solid #ccc; font-weight: bold; color: #333; }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(253, 126, 20, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(253, 126, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 126, 20, 0); }
        }
        #import-input { display: none; }

        @media (max-width: 768px) {
            .editor-area { padding: 15px; }
            .toggle-sidebar { position: static; border-radius: 4px; }
            .bottom-bar { flex-wrap: wrap; gap: 10px; }
            .status-group { gap: 10px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <button class="btn-new-sidebar" onclick="createNewNote()">+ New Note</button>
        <div class="search-container">
            <input type="text" id="sidebar-search" placeholder="Search titles and content..." oninput="renderNoteList()">
        </div>
        <div id="note-list" class="note-list"></div>
        
        <button id="export-btn" class="btn-export" onclick="exportNotes()">Download Backup (JSON)</button>
        <span id="last-backup-text" class="last-backup-text"></span>
        <button class="btn-import" onclick="document.getElementById('import-input').click()">Import Backup (JSON)</button>
        <input type="file" id="import-input" accept=".json" onchange="importNotes(event)">
        
        <button class="btn-nuclear" onclick="nuclearDelete()">☢ Clear All Notes</button>
    </div>

    <div class="editor-area">
        <div id="width-wrapper" class="content-width-wrapper">
            <div class="header-controls">
                <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                <input type="text" id="note-title" placeholder="Note Title..." oninput="handleInput()">
                <button class="btn-new-main" onclick="createNewNote()" title="New Note">+</button>
            </div>

            <div class="editor-content-wrapper">
                <div id="editor-container"></div>
            </div>

            <div class="bottom-bar">
                <div class="status-group">
                    <span id="status" class="save-status">Saved</span>
                    <span id="stats-display" class="stats-text">0 words | 0 chars</span>
                    <button class="btn-secondary-tool" onclick="toggleFullscreen()" id="fullscreen-toggle">⛶ Fullscreen</button>
                    <button class="btn-secondary-tool" onclick="toggleTheme()" id="theme-toggle">🌙 Dark</button>
                    <button class="btn-copy" onclick="copyNote()">Copy Text</button>
                    <span id="backup-nag" class="backup-nag">⚠️ Weekly Backup Due</span>
                </div>
                
                <div class="width-toggle-group">
                    <label><input type="radio" name="width" value="full" onchange="setWidth('full')" checked> Full</label>
                    <label><input type="radio" name="width" value="narrow" onchange="setWidth('narrow')"> Narrow</label>
                </div>
            </div>
        </div>
    </div>

<script src="quill.js"></script>

<script>
    const highlightHandler = function() {
        const range = quill.getSelection();
        if (!range) return;
        const format = quill.getFormat(range);
        quill.format('background', format.background ? false : '#ffff00');
    };

    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: {
                container: [
                    [{ 'size': ['small', false, 'large', 'huge'] }], // Kept only Size, removed Headers
                    ['bold', 'italic', 'underline', 'link'], 
                    ['highlight'], 
                    [{ 'background': ['#ffff00', '#ced4da', '#d4edda', '#f8d7da', false] }], 
                    [{ 'color': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ],
                handlers: { 'highlight': highlightHandler }
            },
            clipboard: { matchVisual: false },
            keyboard: {
                bindings: {
                    highlightShortcut: { key: 'K', shortKey: true, shiftKey: true, handler: highlightHandler },
                    orderedListAutofill: {
                        key: ' ',
                        collapsed: true,
                        format: { list: false },
                        prefix: /^(\d+)\.$/, 
                        handler: function(range, context) {
                            const length = context.prefix.length;
                            this.quill.deleteText(range.index - length, length); 
                            this.quill.formatLine(range.index - length, 1, 'list', 'ordered'); 
                            this.quill.setSelection(range.index - length); 
                            return false; 
                        }
                    }
                }
            }
        },
        theme: 'snow'
    });

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme-pref', theme);
        document.getElementById('theme-toggle').innerText = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    function toggleTheme() {
        applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    document.addEventListener('fullscreenchange', () => {
        document.getElementById('fullscreen-toggle').innerText = document.fullscreenElement ? "✖ Exit" : "⛶ Fullscreen";
    });

    function updateStats() {
        const range = quill.getSelection();
        let text = "";
        
        if (range && range.length > 0) {
            text = quill.getText(range.index, range.length).trim();
            document.getElementById('stats-display').style.color = "#007bff";
        } else {
            text = quill.getText().trim();
            document.getElementById('stats-display').style.color = "var(--secondary-text)";
        }

        const words = text.length > 0 ? text.split(/\s+/).length : 0;
        const chars = text.length;
        
        document.getElementById('stats-display').innerText = `${words} words | ${chars} chars`;
    }

    quill.on('selection-change', (range) => {
        updateStats();
    });

    function handleInput() {
        isDirty = true;
        document.getElementById('status').innerText = "Saving...";
        document.getElementById('status').style.color = "#ff9800";
        updateStats();
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(autoSave, 1000);
    }

    function nuclearDelete() {
        if (confirm("Permanently delete ALL notes?")) {
            if (confirm("Proceed with total wipe?")) {
                localStorage.removeItem('my-github-notes');
                currentNoteId = null;
                createNewNote();
                renderNoteList();
                alert("Database cleared.");
            }
        }
    }

    quill.root.addEventListener('paste', function(e) {
        const range = quill.getSelection();
        if (range && range.length > 0) {
            const clipboardData = e.clipboardData || window.clipboardData;
            if (!clipboardData) return;
            const pastedText = clipboardData.getData('text/plain').trim();
            if (/^(https?:\/\/[^\s]+|www\.[^\s]+)$/i.test(pastedText)) {
                e.preventDefault(); e.stopPropagation(); 
                let url = pastedText.startsWith('http') ? pastedText : 'https://' + pastedText;
                quill.formatText(range.index, range.length, 'link', url);
                quill.setSelection(range.index + range.length); 
            }
        }
    }, true); 

    let currentNoteId = null;
    let saveTimeout = null;
    let isDirty = false;
    const BACKUP_THRESHOLD_DAYS = 7;

    window.onload = () => { 
        renderNoteList();
        checkBackupStatus();
        
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.remove('open');
        localStorage.setItem('sidebar-open', 'false');

        const widthPref = localStorage.getItem('width-pref') || 'full';
        setWidth(widthPref);
        document.querySelector(`input[value="${widthPref}"]`).checked = true;
        applyTheme(localStorage.getItem('theme-pref') || 'light');

        createNewNote();
    };

    window.onbeforeunload = function() { if (isDirty) return "Unsaved changes."; };

    function setWidth(mode) {
        const wrapper = document.getElementById('width-wrapper');
        if (mode === 'narrow') wrapper.classList.add('narrow');
        else wrapper.classList.remove('narrow');
        localStorage.setItem('width-pref', mode);
    }

    function copyNote() {
        const text = quill.getText();
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = 'Copy Text', 2000);
        });
    }

    function toggleSidebar() { 
        const sidebar = document.getElementById('sidebar');
        const isOpen = sidebar.classList.toggle('open');
        localStorage.setItem('sidebar-open', isOpen);
    }

    quill.on('text-change', (delta, oldDelta, source) => {
        if (source === 'user') {
            handleInput();
            const selection = quill.getSelection();
            if (!selection) return;

            if (selection.index >= 2) {
                const text = quill.getText(selection.index - 2, 2);
                if (text === '//') {
                    if (selection.index >= 3 && quill.getText(selection.index - 3, 1) === ':') return; 
                    const format = quill.getFormat(selection.index - 2);
                    quill.deleteText(selection.index - 2, 2);
                    quill.format('background', format.background ? false : '#ffff00');
                    return; 
                }
            }

            if (delta.ops.length > 0) {
                const lastOp = delta.ops[delta.ops.length - 1];
                if (typeof lastOp.insert === 'string' && (lastOp.insert === ' ' || lastOp.insert === '\n')) {
                    const textStart = Math.max(0, selection.index - 100); 
                    const textBefore = quill.getText(textStart, selection.index - textStart - 1); 
                    const words = textBefore.split(/[\s\n]/);
                    const lastWord = words[words.length - 1];
                    if (lastWord && /^(https?:\/\/[^\s]+|www\.[^\s]+)$/i.test(lastWord)) {
                        const wordStart = selection.index - 1 - lastWord.length;
                        let url = lastWord.startsWith('http') ? lastWord : 'https://' + lastWord;
                        quill.formatText(wordStart, lastWord.length, 'link', url);
                    }
                }
            }
        }
    });

    function autoSave() {
        const title = document.getElementById('note-title').value || "Untitled Note";
        const content = quill.getContents();
        let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const noteData = { id: currentNoteId || Date.now(), title, content, date: new Date().toISOString() };
        
        if (currentNoteId !== null) {
            const index = notes.findIndex(n => n.id === currentNoteId);
            if (index > -1) notes[index] = noteData;
        } else {
            notes.push(noteData);
            currentNoteId = noteData.id;
        }
        localStorage.setItem('my-github-notes', JSON.stringify(notes));
        renderNoteList();
        isDirty = false;
        document.getElementById('status').innerText = "Saved";
        document.getElementById('status').style.color = "#28a745";
    }

    function checkBackupStatus() {
        const lastBackup = localStorage.getItem('last-export-date');
        const timeText = document.getElementById('last-backup-text');
        if (!lastBackup) { timeText.innerText = ''; return; }
        const lastDate = new Date(lastBackup);
        timeText.innerText = `Last backup: ${lastDate.toLocaleDateString()}`;
        const diffDays = Math.ceil(Math.abs(new Date() - lastDate) / (1000 * 60 * 60 * 24));
        const nag = document.getElementById('backup-nag');
        const btn = document.getElementById('export-btn');
        if (diffDays >= BACKUP_THRESHOLD_DAYS) { nag.style.display = "inline"; btn.classList.add('needs-backup'); }
        else { nag.style.display = "none"; btn.classList.remove('needs-backup'); }
    }

    function extractTextFromDelta(content) {
        if (!content || !Array.isArray(content.ops)) return "";
        return content.ops.map(op => typeof op.insert === 'string' ? op.insert : '').join('');
    }

    function renderNoteList() {
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const searchTerm = document.getElementById('sidebar-search').value.toLowerCase();
        const listContainer = document.getElementById('note-list');
        listContainer.innerHTML = '';

        const filtered = notes
            .filter(n => n.title.toLowerCase().includes(searchTerm) || extractTextFromDelta(n.content).toLowerCase().includes(searchTerm))
            .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (filtered.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'note-list-empty';
            empty.innerText = searchTerm ? 'No matches.' : 'Empty.';
            listContainer.appendChild(empty);
            return;
        }

        filtered.forEach(note => {
            const div = document.createElement('div');
            div.className = 'note-item';
            const dateStr = new Date(note.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            div.innerHTML = `
                <div style="flex-grow:1; overflow:hidden; padding-right: 10px;" onclick="loadNote(${note.id})">
                    <div style="white-space:nowrap; text-overflow:ellipsis; overflow:hidden; font-weight: 500; color: var(--text-color);">${note.title || "Untitled Note"}</div>
                    <div style="font-size: 0.75em; color: var(--secondary-text); margin-top: 3px;">${dateStr}</div>
                </div>
                <button class="btn-delete" onclick="deleteNote(${note.id})">×</button>
            `;
            listContainer.appendChild(div);
        });
    }

    function loadNote(id) {
        if (isDirty && !confirm("Discard unsaved changes?")) return;
        const notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
        const note = notes.find(n => n.id === id);
        if (note) {
            currentNoteId = note.id;
            document.getElementById('note-title').value = note.title;
            quill.setContents(note.content);
            isDirty = false;
            document.getElementById('status').innerText = "Saved";
            document.getElementById('status').style.color = "#28a745";
            updateStats();
        }
    }

    function createNewNote() {
        if (isDirty && !confirm("Discard unsaved changes?")) return;
        currentNoteId = null; isDirty = false;
        document.getElementById('note-title').value = '';
        quill.setContents([]);
        document.getElementById('status').innerText = "New Note";
        document.getElementById('status').style.color = "#28a745";
        updateStats();
        document.getElementById('note-title').focus();
    }

    function deleteNote(id) {
        if (confirm("Delete this note?")) {
            let notes = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('my-github-notes', JSON.stringify(notes));
            if (currentNoteId === id) createNewNote();
            renderNoteList();
        }
    }

    function exportNotes() {
        const notes = localStorage.getItem('my-github-notes');
        if (!notes || notes === "[]") return alert("No notes!");
        localStorage.setItem('last-export-date', new Date().toISOString());
        checkBackupStatus();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([notes], { type: 'application/json' }));
        a.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importNotes(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                const existing = JSON.parse(localStorage.getItem('my-github-notes') || '[]');
                const existingIds = new Set(existing.map(n => n.id));
                const merged = [...existing, ...imported.filter(n => !existingIds.has(n.id))];
                localStorage.setItem('my-github-notes', JSON.stringify(merged));
                renderNoteList();
                alert("Import complete.");
            } catch (err) { alert("Error."); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }
</script>
</body>
</html>
